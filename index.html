:root{
  --bg:#160a12; --bg-soft:#1f0e1a; --card:#26121f; --card-2:#2e1626; --card-hi:#3a1d30;
  --line:rgba(255,255,255,.07); --line-2:rgba(255,255,255,.13);
  --text:#fdeef6; --dim:#d8a3c2; --mut:#a06f8c;
  --pink:#ff4d97; --rose:#ff85b8; --magenta:#e0218a; --hot:#ff2d78;
  --mint:#3ad9b3; --teal:#27c4dd; --amber:#ffb454; --lila:#c084fc; --red:#fb5b6e; --green:#3ad9b3;
  --g-pink:linear-gradient(135deg,#ff4d97 0%,#e0218a 100%);
  --g-rose:linear-gradient(135deg,#ff85b8 0%,#ff4d97 100%);
  --g-hot:linear-gradient(135deg,#ff2d78 0%,#c01978 100%);
  --g-mint:linear-gradient(135deg,#3ad9b3 0%,#27a3dd 100%);
  --g-lila:linear-gradient(135deg,#c084fc 0%,#ff5fae 100%);
  --g-amber:linear-gradient(135deg,#ffd16a 0%,#ff8a4d 100%);
  --shadow:0 18px 50px -12px rgba(0,0,0,.62);
  --accent:#ff4d97; /* aanpasbaar via instellingen */
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  background:
    radial-gradient(1100px 520px at 12% -8%, rgba(255,77,151,.18), transparent 60%),
    radial-gradient(1000px 480px at 96% 2%, rgba(224,33,138,.16), transparent 56%),
    radial-gradient(900px 700px at 50% 120%, rgba(192,132,252,.10), transparent 60%),
    var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,system-ui,sans-serif;
  line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden;
}
.wrap{max-width:1180px;margin:0 auto;padding:env(safe-area-inset-top) calc(18px + env(safe-area-inset-right)) calc(96px + env(safe-area-inset-bottom)) calc(18px + env(safe-area-inset-left))}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:var(--card-hi);border-radius:8px}
::-webkit-scrollbar-track{background:transparent}
a{color:var(--rose)}
button{font-family:inherit}

/* ---- Topbar ---- */
.topbar{display:flex;align-items:center;gap:14px;padding:18px 2px 14px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:11px;font-weight:800;font-size:18px;letter-spacing:-.01em}
.brand .mark{width:38px;height:38px;border-radius:12px;background:var(--g-pink);box-shadow:0 8px 22px -6px rgba(255,77,151,.75);position:relative;display:flex;align-items:center;justify-content:center;font-size:20px}
.brand .bt{display:flex;flex-direction:column;line-height:1.05}
.brand .bt b{font-size:17px;background:linear-gradient(90deg,#ff85b8,#ff4d97,#e0218a);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.brand .bt span{font-size:10.5px;font-weight:600;color:var(--mut);letter-spacing:.06em;text-transform:uppercase}
.spacer{flex:1}
.pootjespill{display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--line-2);padding:8px 14px;border-radius:30px;font-weight:700;font-size:14px;cursor:pointer;transition:.15s;white-space:nowrap}
.pootjespill:hover{border-color:var(--pink)}
.pootjespill .pw{font-size:16px}

/* ---- Desktop tabs ---- */
.navtabs{display:flex;gap:4px;background:var(--card);border:1px solid var(--line);border-radius:15px;padding:5px}
.navtabs button{font:inherit;font-size:13.5px;font-weight:600;color:var(--dim);background:none;border:none;cursor:pointer;padding:9px 16px;border-radius:11px;transition:.15s;white-space:nowrap;display:flex;align-items:center;gap:7px}
.navtabs button:hover{color:var(--text)}
.navtabs button.active{color:#fff;background:var(--g-pink);box-shadow:0 8px 20px -8px rgba(255,77,151,.7)}
.navtabs .tt-ic{font-size:15px}

/* ---- Mobiele bottom-nav ---- */
.botnav{display:none}

/* ---- Panels ---- */
section.panel{display:none}
section.panel.active{display:block;animation:rise .32s cubic-bezier(.2,.7,.3,1)}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.welcome{font-size:clamp(24px,5.5vw,38px);font-weight:800;letter-spacing:-.02em;margin:10px 0 3px}
.welcome .em{background:linear-gradient(90deg,#ff85b8,#ff4d97);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.subtle{color:var(--dim);font-size:13.5px;margin-bottom:18px}
.ph-title{font-size:24px;font-weight:800;letter-spacing:-.02em;margin:10px 0 3px}

/* ---- Grid ---- */
.row{display:grid;gap:14px;margin-bottom:14px}
.r-2{grid-template-columns:1fr 1fr}
.r-3{grid-template-columns:repeat(3,1fr)}
.r-4{grid-template-columns:repeat(4,1fr)}
.r-2-1{grid-template-columns:2fr 1fr}
.r-1-2{grid-template-columns:1fr 1.5fr}

/* ---- Cards ---- */
.card{background:linear-gradient(180deg,var(--card-2),var(--card));border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.card h3{font-size:14.5px;font-weight:700;letter-spacing:-.01em;display:flex;align-items:center;gap:9px;margin-bottom:3px}
.card .ic{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;background:var(--card-hi)}
.cardsub{font-size:12.5px;color:var(--mut);margin-bottom:14px}
.charttitle{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px;flex-wrap:wrap}
.charttitle .rt{font-size:12px;color:var(--mut)}

/* ---- KPI ---- */
.kpi{border-radius:18px;padding:18px;position:relative;overflow:hidden;min-height:130px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:var(--shadow)}
.kpi.g-pink{background:var(--g-pink)} .kpi.g-rose{background:var(--g-rose)}
.kpi.g-hot{background:var(--g-hot)} .kpi.g-mint{background:var(--g-mint)}
.kpi.g-lila{background:var(--g-lila)} .kpi.g-amber{background:var(--g-amber)}
.kpi::before{content:"";position:absolute;width:150px;height:150px;border-radius:50%;background:rgba(255,255,255,.14);top:-66px;right:-46px}
.kpi .klab{font-size:12.5px;font-weight:600;color:rgba(255,255,255,.9);position:relative}
.kpi .kbig{font-size:38px;font-weight:800;letter-spacing:-.03em;line-height:1;color:#fff;position:relative}
.kpi .kbig small{font-size:14px;font-weight:600;opacity:.85;margin-left:5px}
.kpi .kfoot{font-size:12px;color:rgba(255,255,255,.9);position:relative;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.kpi .chiplet{background:rgba(255,255,255,.24);padding:3px 9px;border-radius:20px;font-weight:700;font-size:11px}
/* horizontale carrousel (o.a. PR-muur op de voorpagina) */
.hscroll{display:flex;gap:12px;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;padding-bottom:2px;margin:0 -2px;scrollbar-width:none}
.hscroll::-webkit-scrollbar{display:none}
.hscroll>.kpi{flex:0 0 auto;width:154px;min-height:118px}

/* ---- MiniStat ---- */
.statline{display:flex;flex-direction:column;gap:11px}
.miniStat{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 14px;background:var(--card);border:1px solid var(--line);border-radius:14px}
.miniStat .ms-l{display:flex;align-items:center;gap:11px}
.miniStat .ms-ic{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:16px}
.ms-ic.p{background:rgba(255,77,151,.16);color:var(--pink)} .ms-ic.r{background:rgba(255,133,184,.16);color:var(--rose)}
.ms-ic.m{background:rgba(58,217,179,.16);color:var(--mint)} .ms-ic.a{background:rgba(255,180,84,.16);color:var(--amber)}
.ms-ic.l{background:rgba(192,132,252,.16);color:var(--lila)} .ms-ic.t{background:rgba(39,196,221,.16);color:var(--teal)}
.miniStat .ms-lab{font-size:12.5px;color:var(--dim)}
.miniStat .ms-sub{font-size:11px;color:var(--mut)}
.miniStat .ms-val{font-size:19px;font-weight:800;letter-spacing:-.02em;text-align:right}
.miniStat .ms-val small{font-size:11.5px;font-weight:600;color:var(--mut)}

/* ---- Chips / pills ---- */
.chip{font-size:11px;font-weight:700;letter-spacing:.02em;padding:3px 10px;border-radius:20px;display:inline-flex;align-items:center;gap:5px}
.chip.pink{background:rgba(255,77,151,.16);color:var(--rose)}
.chip.mint{background:rgba(58,217,179,.16);color:var(--mint)}
.chip.amber{background:rgba(255,180,84,.16);color:var(--amber)}
.chip.lila{background:rgba(192,132,252,.16);color:var(--lila)}
.chip.mut{background:rgba(255,255,255,.07);color:var(--dim)}
.ipill{font-size:9.5px;font-weight:800;letter-spacing:.03em;text-transform:uppercase;padding:2px 8px;border-radius:20px}
.i-laag{background:rgba(58,217,179,.16);color:var(--mint)} .i-matig{background:rgba(255,180,84,.16);color:var(--amber)} .i-hoog{background:rgba(251,91,110,.18);color:var(--red)}
.legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--dim);margin-top:12px}
.legend span{display:flex;align-items:center;gap:7px}
.ldot{width:9px;height:9px;border-radius:50%}

/* ---- Buttons ---- */
.btn{font:inherit;font-size:13.5px;font-weight:700;letter-spacing:.01em;background:var(--g-pink);color:#fff;border:none;padding:11px 20px;border-radius:12px;cursor:pointer;box-shadow:0 8px 20px -8px rgba(255,77,151,.65);transition:.15s;display:inline-flex;align-items:center;gap:8px;justify-content:center}
.btn:hover{filter:brightness(1.07);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn.sm{padding:9px 14px;font-size:12.5px;border-radius:10px;min-height:40px}
.btn.lg{padding:14px 24px;font-size:15px}
.btn.block{width:100%}
.btn.ghost{background:var(--card);color:var(--text);border:1px solid var(--line-2);box-shadow:none}
.btn.ghost:hover{border-color:var(--pink)}
.btn.mint{background:var(--g-mint);box-shadow:0 8px 20px -8px rgba(58,217,179,.6)}
.btn.danger{background:var(--card);color:var(--red);border:1px solid rgba(251,91,110,.4);box-shadow:none}
.btn.danger:hover{background:rgba(251,91,110,.14)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none;filter:none}

/* ---- Forms ---- */
.frow{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:10px}
.frow.c2{grid-template-columns:1fr 1fr}
.frow.c3{grid-template-columns:repeat(3,1fr)}
.frow.c1{grid-template-columns:1fr}
.field label,.fl{display:block;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--mut);margin-bottom:5px}
input,select,textarea{width:100%;font:inherit;font-size:14px;padding:10px 12px;border:1px solid var(--line-2);background:var(--bg-soft);color:var(--text);border-radius:10px;outline:none;transition:.15s}
input:focus,select:focus,textarea:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(255,77,151,.18)}
textarea{min-height:52px;resize:vertical}
input[type=checkbox]{width:auto}
.ex-help{width:19px;height:19px;border-radius:50%;border:1px solid var(--line-2);background:var(--card-hi);color:var(--rose);font-size:11px;font-weight:800;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;line-height:1}
.ex-help:hover{border-color:var(--pink);background:var(--bg-soft)}
.factions{display:flex;gap:9px;align-items:center;flex-wrap:wrap;margin-top:6px}

/* segmented control */
.seg{display:inline-flex;background:var(--bg-soft);border:1px solid var(--line-2);border-radius:11px;padding:3px;gap:2px;flex-wrap:wrap}
.seg button{font:inherit;font-size:12.5px;font-weight:600;color:var(--dim);background:none;border:none;padding:8px 13px;border-radius:8px;cursor:pointer;transition:.12s}
.seg button.on{background:var(--g-pink);color:#fff}
.seg.mint button.on{background:var(--g-mint)}

/* toggle */
.toggle{position:relative;width:46px;height:26px;border-radius:30px;background:var(--card-hi);border:1px solid var(--line-2);cursor:pointer;transition:.18s;flex-shrink:0}
.toggle.on{background:var(--g-pink);border-color:transparent}
.toggle::after{content:"";position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.18s}
.toggle.on::after{left:22px}

/* ---- Rings ---- */
.ringwrap{position:relative;display:inline-flex;align-items:center;justify-content:center}

/* ---- Notes / empty / warn ---- */
.note{font-size:13px;color:var(--dim);margin:4px 0 16px;line-height:1.6}
.empty{padding:38px 20px;text-align:center;color:var(--mut);border:1px dashed var(--line-2);background:var(--card);border-radius:16px;font-size:13.5px}
.warn{background:linear-gradient(100deg,rgba(255,180,84,.14),var(--card));border:1px solid rgba(255,180,84,.36);padding:13px 15px;border-radius:14px;font-size:13px;margin:14px 0;color:#ffe2b8;line-height:1.5}
.signal{background:linear-gradient(100deg,rgba(255,77,151,.14),var(--card));border:1px solid rgba(255,77,151,.34);padding:13px 15px;border-radius:14px;font-size:13px;margin:8px 0;color:#ffd6e8;line-height:1.55;display:flex;gap:10px;align-items:flex-start}
.signal .si{font-size:17px;flex-shrink:0}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:4px 0 16px;align-items:center}
.toolbar .sp{flex:1}

/* ---- Table ---- */
table{width:100%;border-collapse:collapse;font-size:13px}
.tablewrap{background:linear-gradient(180deg,var(--card-2),var(--card));border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:var(--shadow);overflow-x:auto}
th,td{padding:12px 14px;text-align:left;border-bottom:1px solid var(--line);vertical-align:middle;white-space:nowrap}
th{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--mut)}
tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--card-hi)}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}

footer.foot{margin-top:42px;padding-top:18px;border-top:1px solid var(--line);font-size:12px;color:var(--mut);line-height:1.7}

/* ---- Modal ---- */
.overlay{position:fixed;inset:0;background:rgba(8,3,7,.74);backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);z-index:200;display:none;align-items:flex-start;justify-content:center;padding:calc(24px + env(safe-area-inset-top)) 16px calc(40px + env(safe-area-inset-bottom));overflow-y:auto}
.overlay.show{display:flex;animation:fade .2s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{background:linear-gradient(180deg,var(--card-2),var(--card));border:1px solid var(--line-2);border-radius:22px;box-shadow:0 30px 80px -20px rgba(0,0,0,.8);width:100%;max-width:560px;padding:22px;position:relative;animation:pop .26s cubic-bezier(.2,.8,.3,1.1);margin:auto 0}
.modal.wide{max-width:760px}
@keyframes pop{from{opacity:0;transform:scale(.94) translateY(12px)}to{opacity:1;transform:none}}
.modal h2{font-size:21px;font-weight:800;letter-spacing:-.02em;margin-bottom:5px}
.modal .msub{font-size:13px;color:var(--dim);margin-bottom:16px;line-height:1.55}
.modal .x{position:absolute;top:14px;right:14px;width:40px;height:40px;border-radius:11px;border:1px solid var(--line-2);background:var(--card);color:var(--dim);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal .x:hover{color:#fff;border-color:var(--pink)}

/* ---- Toast ---- */
#toasts{position:fixed;left:50%;bottom:calc(86px + env(safe-area-inset-bottom));transform:translateX(-50%);z-index:300;display:flex;flex-direction:column;gap:9px;align-items:center;pointer-events:none;width:max-content;max-width:92vw}
.toast{background:linear-gradient(135deg,var(--card-hi),var(--card-2));border:1px solid var(--line-2);color:var(--text);padding:12px 18px;border-radius:14px;font-size:13.5px;font-weight:600;box-shadow:0 14px 40px -10px rgba(0,0,0,.7);display:flex;align-items:center;gap:10px;animation:toastin .3s cubic-bezier(.2,.8,.3,1.2);max-width:100%}
.toast.good{border-color:rgba(58,217,179,.5)} .toast.party{border-color:rgba(255,77,151,.6);background:linear-gradient(135deg,#3a1d30,#4a1430)}
.toast .te{font-size:18px}
@keyframes toastin{from{opacity:0;transform:translateY(16px) scale(.9)}to{opacity:1;transform:none}}
@keyframes toastout{to{opacity:0;transform:translateY(-10px) scale(.95)}}

#confetti{position:fixed;inset:0;pointer-events:none;z-index:280;display:none}

/* ---- Responsive ---- */
@media(max-width:860px){
  .r-4{grid-template-columns:repeat(2,1fr)}
  .r-3{grid-template-columns:1fr}
  .r-2-1,.r-1-2,.r-2{grid-template-columns:1fr}
}
@media(max-width:680px){
  .wrap{padding:env(safe-area-inset-top) calc(13px + env(safe-area-inset-right)) calc(92px + env(safe-area-inset-bottom)) calc(13px + env(safe-area-inset-left))}
  .frow{grid-template-columns:repeat(2,1fr)}
  .desktop-tabs{display:none}
  .topbar{padding:14px 2px 10px}
  .brand .bt span{display:none}
  /* bottom nav */
  .botnav{display:flex;position:fixed;left:0;right:0;bottom:0;z-index:150;background:rgba(26,12,21,.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid var(--line-2);padding:8px 6px calc(8px + env(safe-area-inset-bottom));justify-content:space-around}
  .botnav button{flex:1;background:none;border:none;color:var(--mut);font:inherit;font-size:10px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 2px;border-radius:12px;cursor:pointer;transition:.15s}
  .botnav button .bi{font-size:21px;line-height:1;transition:.15s}
  .botnav button.active{color:var(--rose)}
  .botnav button.active .bi{transform:translateY(-2px) scale(1.12)}
  .kpi{min-height:118px;padding:15px}
  .kpi .kbig{font-size:32px}
}
@media(max-width:380px){ .frow{grid-template-columns:1fr} }

/* ============ ZOO / SPEL ============ */
.zoo-stage{position:relative;border-radius:20px;overflow:hidden;height:330px;border:1px solid var(--line-2);box-shadow:var(--shadow);user-select:none;touch-action:none}
.zoo-sky{position:absolute;inset:0;transition:background 1.5s ease}
.zoo-ground{position:absolute;left:0;right:0;bottom:0;height:34%}
.zoo-deco{position:absolute;pointer-events:none;opacity:.92}
.daytint{position:absolute;inset:0;pointer-events:none;transition:background 1.5s ease;mix-blend-mode:multiply}
.zoo-star{position:absolute;width:2px;height:2px;border-radius:50%;background:#fff;opacity:.85;animation:twinkle 3s infinite}
@keyframes twinkle{0%,100%{opacity:.25}50%{opacity:.9}}
.critter{position:absolute;cursor:grab;z-index:2;transition:left .12s linear;will-change:transform;filter:drop-shadow(0 4px 6px rgba(0,0,0,.3))}
.critter:active{cursor:grabbing}
.critter .bob{animation:bob 2.4s ease-in-out infinite;transform-origin:center bottom}
.critter .flip{transform-origin:center}
.critter.faceL .flip{transform:scaleX(-1)}
.critter.jumping .bob{animation:cjump .55s ease}
.critter.fly,.critter.swim{filter:drop-shadow(0 2px 4px rgba(0,0,0,.18))}
.critter.fly .bob{animation:flutter 3.4s ease-in-out infinite}
.critter.swim .bob{animation:swim 4.2s ease-in-out infinite}
@keyframes flutter{0%,100%{transform:translateY(0) rotate(-2.5deg)}50%{transform:translateY(-8px) rotate(2.5deg)}}
@keyframes swim{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes cjump{0%{transform:translateY(0)}30%{transform:translateY(-26px)}55%{transform:translateY(-10px)}75%{transform:translateY(-18px)}100%{transform:translateY(0)}}
.critter .eye-l,.critter .eye-r{transform-origin:center;animation:blink 4.5s infinite}
@keyframes blink{0%,93%,100%{transform:scaleY(1)}96%{transform:scaleY(.08)}}
.critter.asleep .eye-l,.critter.asleep .eye-r{transform:scaleY(.08)}
.critter.asleep .bob{animation:bob 3.6s ease-in-out infinite}
.zzz{position:absolute;top:-6px;right:-2px;font-size:13px;color:#fff;opacity:.9;animation:zzz 2.6s ease-in-out infinite;text-shadow:0 1px 2px rgba(0,0,0,.4)}
@keyframes zzz{0%{opacity:0;transform:translateY(4px) scale(.7)}40%{opacity:.95}100%{opacity:0;transform:translateY(-16px) scale(1.1)}}
.speech{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#fff;color:#3a1d30;font-size:11px;font-weight:700;padding:5px 10px;border-radius:12px;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.3);animation:speechpop .3s;z-index:5;margin-bottom:4px;max-width:160px}
.speech::after{content:"";position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:#fff}
@keyframes speechpop{from{opacity:0;transform:translateX(-50%) translateY(6px) scale(.8)}to{opacity:1;transform:translateX(-50%) scale(1)}}
.zoo-hud{position:absolute;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;z-index:6;pointer-events:none}

.zoo-tools{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}

.zone-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:10px}
.zone-tabs button{font:inherit;font-size:12.5px;font-weight:600;color:var(--dim);background:var(--card);border:1px solid var(--line);border-radius:11px;padding:8px 13px;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:6px}
.zone-tabs button.on{background:var(--g-pink);color:#fff;border-color:transparent}

.shopgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px}
@media(min-width:560px){.shopgrid{grid-template-columns:repeat(3,1fr)}}
.shopcard{background:var(--bg-soft);border:1px solid var(--line-2);border-radius:15px;padding:12px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px;position:relative;transition:.15s}
.shopcard:hover{border-color:var(--pink);transform:translateY(-2px)}
.shopcard .svgwrap{width:84px;height:84px}
.shopcard .sc-naam{font-size:13px;font-weight:700}
.shopcard .rar{position:absolute;top:8px;left:8px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:2px 7px;border-radius:20px}
.rar-gewoon{background:rgba(255,255,255,.1);color:var(--dim)} .rar-zeldzaam{background:rgba(39,196,221,.18);color:var(--teal)}
.rar-legendarisch{background:rgba(255,180,84,.2);color:var(--amber)} .rar-special{background:rgba(255,77,151,.2);color:var(--rose)} .rar-event{background:rgba(192,132,252,.2);color:var(--lila)}
.shopcard .price{font-size:13px;font-weight:800;color:var(--rose);display:flex;align-items:center;gap:4px}
.shopcard.owned{opacity:.72}
.shopcard.locked{opacity:.85}
.shopcard .ownedtag{font-size:11px;font-weight:700;color:var(--mint)}

.gidsgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(min-width:560px){.gidsgrid{grid-template-columns:repeat(4,1fr)}}
.gidscell{background:var(--bg-soft);border:1px solid var(--line);border-radius:13px;padding:8px;text-align:center;cursor:pointer;transition:.15s}
.gidscell:hover{border-color:var(--pink)}
.gidscell .svgwrap{width:64px;height:64px;margin:0 auto}
.gidscell.lock .svgwrap{filter:brightness(0) saturate(0) opacity(.34)}
.gidscell .gn{font-size:11px;font-weight:600;margin-top:3px;color:var(--dim)}
.gidscell.lock .gn{color:var(--mut)}
.eggwrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.egg{font-size:64px;animation:eggwiggle 2.4s ease-in-out infinite;cursor:pointer;transform-origin:center bottom}
@keyframes eggwiggle{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
.egg.hatching{animation:eggshake .4s ease-in-out infinite}
@keyframes eggshake{0%,100%{transform:rotate(-10deg) scale(1.02)}50%{transform:rotate(10deg) scale(1.05)}}
.progbar{height:9px;border-radius:6px;background:var(--card-hi);overflow:hidden;width:100%}
.progbar i{display:block;height:100%;background:var(--g-pink);border-radius:6px;transition:width .5s}
.quest-row{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--line)}
.quest-row:last-child{border-bottom:none}
.badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(74px,1fr));gap:10px}
.badge{text-align:center;font-size:11px;color:var(--dim)}
.badge .bch{width:54px;height:54px;border-radius:50%;margin:0 auto 5px;display:flex;align-items:center;justify-content:center;font-size:24px;background:var(--card-hi);border:1px solid var(--line-2)}
.badge.has .bch{background:var(--g-pink);box-shadow:0 6px 16px -6px rgba(255,77,151,.6)}
.badge.no .bch{filter:grayscale(1) brightness(.6);opacity:.5}
.starrow{display:inline-flex;gap:2px;font-size:14px}

/* ============ ZOO TYCOON (parkkaart + volwassener reskin) ============ */
.zoo-tycoon{ --zoo-burgundy:#5a3d4a; --zoo-rose-muted:#8a6f7a; --zoo-ink:#2e2230; --zoo-sage:#4a8f6e; --zoo-terracotta:#c8845f; --zoo-stone:#c8b8a8; --zoo-line:rgba(255,255,255,.08); }
.park-hud{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.park-hud .ph-stat{flex:1;min-width:78px;background:linear-gradient(160deg,var(--card-2),var(--card));border:1px solid var(--zoo-line);border-radius:14px;padding:11px 12px}
.park-hud .ph-lab{font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--zoo-rose-muted)}
.park-hud .ph-val{font-size:21px;font-weight:800;letter-spacing:-.02em;margin-top:2px;display:flex;align-items:center;gap:5px}
.park-hud .ph-val small{font-size:11px;font-weight:600;color:var(--mut)}
.zoo-minimap{position:relative;display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:9px;padding:13px;background:
  repeating-linear-gradient(45deg, rgba(255,255,255,.012) 0 10px, transparent 10px 20px), linear-gradient(160deg,var(--card-2),var(--card));
  border:1px solid var(--zoo-line);border-radius:18px;margin-bottom:12px;box-shadow:var(--shadow)}
.zoo-minimap .mini-title{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:1px}
.zoo-minimap .mini-title b{font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--zoo-stone);font-family:Georgia,"Times New Roman",serif}
.enc-cell{position:relative;border:1px solid var(--zoo-burgundy);border-radius:13px;padding:10px 9px 9px;min-height:104px;display:flex;flex-direction:column;gap:6px;cursor:pointer;background:rgba(255,255,255,.022);transition:transform .15s,border-color .15s;overflow:hidden}
.enc-cell:hover{transform:translateY(-2px);border-color:var(--zoo-rose-muted)}
.enc-cell.active{border-color:var(--pink);box-shadow:0 0 0 1px var(--pink),0 8px 22px -10px rgba(255,77,151,.5)}
.enc-cell .enc-tint{position:absolute;inset:0;opacity:.13;pointer-events:none}
.enc-cell .enc-head{display:flex;align-items:center;gap:5px;position:relative}
.enc-cell .enc-ic{font-size:14px;flex-shrink:0}
.enc-cell .enc-name{font-size:9.5px;font-weight:800;letter-spacing:.03em;text-transform:uppercase;color:#fff;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.enc-cell .enc-foot{justify-content:space-between}
.enc-cell .enc-icons{display:flex;align-items:flex-end;gap:1px;min-height:26px;position:relative;flex-wrap:wrap}
.enc-cell .enc-yard{position:relative;height:30px;margin:1px 0}
.enc-cell .enc-more{position:absolute;right:2px;bottom:1px;font-size:9.5px;font-weight:700;color:var(--zoo-rose-muted);background:rgba(0,0,0,.25);padding:0 4px;border-radius:8px}
.mini-walker{position:absolute;width:26px;height:24px;bottom:1px;z-index:1;animation:miniwalk var(--dur,8s) ease-in-out var(--del,0s) infinite}
.mini-walker .mini-sprite{width:100%;height:100%;transform-origin:center;animation:miniflip var(--dur,8s) step-end var(--del,0s) infinite}
@keyframes miniwalk{0%{left:2%}48%{left:58%}50%{left:58%}98%{left:2%}100%{left:2%}}
@keyframes miniflip{0%,49%{transform:scaleX(1)}50%,99%{transform:scaleX(-1)}100%{transform:scaleX(1)}}
.zoo-tycoon.night .mini-walker,.zoo-tycoon.night .mini-walker .mini-sprite{animation-play-state:paused}
.park-path{grid-column:1/-1;display:flex;align-items:center;gap:8px;margin-top:3px;background:repeating-linear-gradient(90deg,var(--zoo-stone) 0 14px,#bcae9c 14px 16px);border:1px solid var(--zoo-burgundy);border-radius:11px;padding:7px 9px;position:relative;overflow:hidden;min-height:40px}
.park-entrance{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:800;letter-spacing:.03em;color:#3a2230;background:linear-gradient(180deg,#ffd6a0,#e8a85a);border:1px solid #b07a3e;border-radius:8px;padding:4px 9px;flex-shrink:0;box-shadow:0 2px 5px rgba(0,0,0,.2);z-index:2}
.park-lane{position:relative;flex:1;min-width:0;height:26px}
.park-lane .stall{position:absolute;bottom:1px;font-size:18px;filter:drop-shadow(0 2px 2px rgba(0,0,0,.25));z-index:2}
.park-lane .visit-dot{bottom:3px}
.zoo-tycoon.night .park-lane .visit-dot{animation-play-state:paused}
/* isometrische parkkaart */
.iso-map{position:relative;width:100%;aspect-ratio:360/240;border-radius:18px;overflow:hidden;border:1px solid var(--zoo-burgundy);background:linear-gradient(180deg,#a6cf80,#7faa5a);box-shadow:var(--shadow);margin-bottom:11px}
.iso-bg{display:block;width:100%;height:100%}
.iso-overlay{position:absolute;inset:0}
.iso-sign{position:absolute;transform:translate(-50%,-100%);background:rgba(20,8,16,.74);color:#fff;font-size:8.5px;font-weight:800;letter-spacing:.03em;text-transform:uppercase;padding:2px 6px;border-radius:7px;white-space:nowrap;border:1px solid rgba(255,255,255,.14);cursor:pointer;z-index:4}
.iso-sign.on{background:var(--g-pink);border-color:transparent}
.iso-walker{position:absolute;width:22px;height:20px;transform:translate(-50%,-100%);z-index:3;animation:isopace var(--dur,7s) ease-in-out var(--del,0s) infinite}
.iso-walker .mini-sprite{width:100%;height:100%;transform-origin:center;animation:miniflip var(--dur,7s) step-end var(--del,0s) infinite}
@keyframes isopace{0%{margin-left:-9px}50%{margin-left:9px}100%{margin-left:-9px}}
.iso-stall{position:absolute;transform:translate(-50%,-100%);font-size:15px;filter:drop-shadow(0 2px 2px rgba(0,0,0,.3));z-index:3;cursor:pointer}
.iso-hint{position:absolute;top:8px;left:10px;font-size:10px;font-weight:700;color:#3a2230;background:rgba(255,255,255,.6);padding:2px 8px;border-radius:20px;z-index:5}
.iso-map.night{filter:brightness(.64) saturate(.82)}
.iso-map.night .iso-walker{animation-play-state:paused}
/* geïllustreerde parkkaart (optie 1) */
.park-map{position:relative;width:100%;aspect-ratio:36/31;border-radius:18px;overflow:hidden;border:1px solid var(--zoo-burgundy);box-shadow:var(--shadow);margin-bottom:11px}
.park-map .pm-bg{display:block;width:100%;height:100%}
.park-map .pm-ov{position:absolute;inset:0}
.pm-walker{position:absolute;width:21px;height:19px;transform:translate(-50%,-100%);z-index:3;animation:isopace var(--dur,7s) ease-in-out var(--del,0s) infinite}
.pm-walker .mini-sprite{width:100%;height:100%;transform-origin:center;animation:miniflip var(--dur,7s) step-end var(--del,0s) infinite}
.pm-sign{position:absolute;transform:translate(-50%,-100%);z-index:4;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:0}
.pm-sign .pm-banner{background:linear-gradient(180deg,#3a2230,#2a1822);color:#fff;font-size:8.5px;font-weight:800;letter-spacing:.02em;padding:2px 7px;border-radius:7px;white-space:nowrap;border:1px solid rgba(255,255,255,.18);box-shadow:0 2px 5px rgba(0,0,0,.3);display:flex;align-items:center;gap:4px}

.pm-sign.below{flex-direction:column-reverse;transform:translate(-50%,0)}
.pm-pin{position:absolute;transform:translate(-50%,-100%);background:rgba(20,8,16,.72);color:#fff;font-size:11px;font-weight:800;padding:2px 7px;border-radius:20px;white-space:nowrap;border:1px solid rgba(255,255,255,.18);cursor:pointer;z-index:4;display:flex;align-items:center;gap:3px;box-shadow:0 2px 4px rgba(0,0,0,.3)}
.pm-pin .pm-cnt{font-size:9px;opacity:.85}
.pm-sign .pm-banner b{font-weight:800}

.pm-stall{position:absolute;transform:translate(-50%,-100%);font-size:16px;filter:drop-shadow(0 2px 2px rgba(0,0,0,.32));z-index:3;cursor:pointer}
.pm-hint{position:absolute;top:8px;left:10px;font-size:10px;font-weight:700;color:#fff;background:rgba(20,8,16,.45);padding:2px 9px;border-radius:20px;z-index:5;backdrop-filter:blur(3px)}
.park-map.night{filter:brightness(.66) saturate(.86)}
.park-map.night .pm-walker{animation-play-state:paused}
.enc-cell .enc-facils{display:flex;gap:3px;position:relative;font-size:12px;opacity:.92;min-height:14px}
.enc-cell .enc-foot{display:flex;align-items:center;justify-content:space-between;gap:6px;position:relative;margin-top:auto}

.enc-cell.add{align-items:center;justify-content:center;border-style:dashed;color:var(--zoo-rose-muted);font-weight:700;font-size:12px;text-align:center;gap:4px}

<script>
/* ============================================================
   BBB — STATE & STORAGE  (fase 1)
   ============================================================ */
const STORE_KEY = "bbb_v1";
const APP_VERSION = 1;

/* Tijdzone-veilig: alle ISO-datums uit lokale componenten, nooit via UTC (toISOString),
   anders rolt lokale middernacht in negatieve tijdzones een dag terug. */
function pad2(n){ return (n<10?"0":"")+n; }
function isoOf(d){ return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate()); }
function todayISO(){ return isoOf(new Date()); }
function nowMs(){ return Date.now(); }

function defaultState(){
  return {
    v: APP_VERSION,
    profile: {
      naam: "Bo",
      startGewicht: null, streefGewicht: null, lengte: null,
      eiwitDoel: null, stappenDoel: 10000,
      cyclusAan: false, cyclusStart: null, cyclusDuur: 28,
      aiEndpoint: "", aiKey: "", aiModel: "claude-haiku-4-5",
      accent: "#ff4d97", zooNaam: "Bo's Beestenboel",
      geluid: true, notifs: false, onboarded: false
    },
    weights: [],            // [{datum, kg}]
    sessions: [],           // gelogde trainingen (zie fase 2)
    protein: {},            // {YYYY-MM-DD: {meals:[{id,naam,gram}], gehaald, notitie}}
    steps: {},              // {YYYY-MM-DD: {steps, pootjesAwarded, hatchCounted}}  (fase 8)
    cycle: [],              // [YYYY-MM-DD] menstruatie-startdatums
    templates: null,        // null => standaard uit TEMPLATES (fase 2)
    customExercises: [],    // extra oefeningen door Bo toegevoegd
    week: null,             // huidig weekvoorstel (fase 2/3)
    exMemory: {},           // {exId: laatste set-historie} (fase 2)
    game: defaultGame(),
    milestonesHit: [],      // id's van behaalde mijlpalen
    badges: [],             // behaalde prestatie-badges
    meta: { created: todayISO(), lastWeekStart: null }
  };
}
function defaultGame(){
  return {
    pootjes: 0,
    dieren: [ { id:"a_stekkie", soort:"stekkie", naam:"Stekkie",
                groei:1.0, blijheid:100, voer:0, zone:"home", x:50, y:0, skin:"normaal", verkregen: todayISO() } ],
    zones: ["home"],
    decoraties: [],         // [{id, soort(emoji-key), zone, x, y}]
    faciliteiten: [],       // [{id, soort, zone}]  (fase 8 tycoon)
    streakDagen: 0, streakLaatste: null, streakRecord: 0,
    eieren: 0, sessiesSindsEi: 0, pityTeller: 0, broedStappen: 0,
    album: ["stekkie"],     // ontdekte soorten
    badges: [],
    quests: null, questMaand: null,
    zooNiveau: 1, bezoekers: 0,
    events: {}, eventDieren: [],
    activeZone: "home",
    totaalEierenUit: 0,
    zooNachtForce: null      // null=auto (volgt de klok), true=nacht, false=dag
  };
}

let S = loadState();

function loadState(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(!raw) return defaultState();
    let d = JSON.parse(raw);
    d = migrate(d);
    return deepDefaults(d, defaultState());
  }catch(e){
    console.warn("State laden mislukt, verse start.", e);
    return defaultState();
  }
}
/* vul ontbrekende sleutels aan met defaults (veilig migreren / uitbreiden) */
function deepDefaults(obj, def){
  if(Array.isArray(def)) return Array.isArray(obj)? obj : def.slice();
  if(def && typeof def==="object"){
    const out = (obj && typeof obj==="object" && !Array.isArray(obj)) ? obj : {};
    for(const k in def){
      if(def[k] && typeof def[k]==="object" && !Array.isArray(def[k]))
        out[k] = deepDefaults(out[k], def[k]);
      else if(out[k]===undefined || out[k]===null) out[k] = def[k];   // null (corrupt/hand-edit) → default
    }
    return out;
  }
  return obj===undefined ? def : obj;
}
function migrate(d){
  // versie-gestuurde schema-migraties — vangnet voor toekomstige hernoemingen/typewijzigingen
  let v = d.v || 0;
  // if(v < 2){ /* verbouw d naar schema v2 */ }
  // if(v < 3){ /* ... */ }
  d.v = APP_VERSION;
  return d;
}
function save(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(S)); }
  catch(e){ toast("⚠️","Opslaan mislukt — open het bestand lokaal of geef opslagruimte vrij.","warn"); }
}

/* ============================================================
   HELPERS — datums, week, formatteren, dom
   ============================================================ */
const DAGEN_NL = ["Ma","Di","Wo","Do","Vr","Za","Zo"];
const DAGEN_LANG = ["Maandag","Dinsdag","Woensdag","Donderdag","Vrijdag","Zaterdag","Zondag"];
const MND_NL = ["jan","feb","mrt","apr","mei","jun","jul","aug","sep","okt","nov","dec"];

function parseISO(iso){ return new Date(iso+"T00:00:00"); }
function addDays(iso,n){ const d=parseISO(iso); d.setDate(d.getDate()+n); return isoOf(d); }
function daysBetween(a,b){ return Math.round((parseISO(b)-parseISO(a))/86400000); }
function mondayOf(iso){ const d=parseISO(iso); const wd=(d.getDay()+6)%7; d.setDate(d.getDate()-wd); return isoOf(d); }
function thisMonday(){ return mondayOf(todayISO()); }
function fmtDate(iso,opt){ try{ return parseISO(iso).toLocaleDateString("nl-NL", opt||{day:"numeric",month:"short"}); }catch(e){ return iso; } }
function fmtDayShort(iso){ return parseISO(iso).toLocaleDateString("nl-NL",{day:"numeric",month:"short"}); }
function monthKey(iso){ return iso.slice(0,7); }

function num(v){ const n=Number(v); return isNaN(n)?0:n; }
function isNum(v){ return v!==""&&v!=null&&!isNaN(Number(v)); }
function fmt(n,d=0){ return (n==null||isNaN(n))?"—":Number(n).toLocaleString("nl-NL",{minimumFractionDigits:d,maximumFractionDigits:d}); }
function fmtKg(n){ return (n==null||isNaN(n))?"—":Number(n).toLocaleString("nl-NL",{minimumFractionDigits:1,maximumFractionDigits:1}); }
function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }
function uid(p){ return (p||"id")+Date.now().toString(36)+Math.floor(Math.random()*1e4).toString(36); }
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function sum(arr,f){ return arr.reduce((s,e)=>s+(num(f?f(e):e)||0),0); }
function avgOf(arr,f){ const v=arr.map(f||(x=>x)).filter(isNum).map(Number); return v.length? v.reduce((a,b)=>a+b,0)/v.length : null; }
function maxOf(arr,f){ const v=arr.map(f||(x=>x)).filter(isNum).map(Number); return v.length? Math.max(...v): 0; }
function el(id){ return document.getElementById(id); }
function plural(n,a,b){ return n===1?a:b; }

/* week-venster: sessies met datum in [maandag, maandag+6] */
function weekRange(monday){ return {start:monday, end:addDays(monday,6)}; }
function sessionsInWeek(monday){ const r=weekRange(monday); return S.sessions.filter(s=>s.datum>=r.start && s.datum<=r.end); }
function sessionsThisWeek(){ return sessionsInWeek(thisMonday()); }

/* intensiteit → loadfactor (zoals referentie) */
const INTFACT = { laag:3, matig:5, hoog:7 };
function sessLoad(s){
  const dur = num(s.duur); if(!dur) return 0;
  if(isNum(s.rpe)) return Math.round(dur * num(s.rpe));
  return Math.round(dur * (INTFACT[s.intensiteit]||5));
}

const TYPE_LABEL = { gym:"Gym", hardlopen:"Hardlopen", hiit:"HIIT", padel:"Padel" };
const TYPE_ICON  = { gym:"🏋️‍♀️", hardlopen:"🏃‍♀️", hiit:"🔥", padel:"🎾" };
const TYPE_GRAD  = { gym:["#ff4d97","#e0218a"], hardlopen:["#c084fc","#ff5fae"], hiit:["#ff8a4d","#ff2d78"], padel:["#3ad9b3","#27a3dd"] };
/* sportmaatjes: elk dier hoort random bij 1 van 3 groepen; blijheid zakt per dag en gaat omhoog bij een matchende training */
const SPORT_GROUPS = ["hardlopen","gym","hiit"];
const SPORT_LABEL  = { hardlopen:"Hardloop-maatje", gym:"Gym-maatje", hiit:"HIIT-maatje" };
const HAPPY_DECAY_TIERS = [ {min:60, rate:20}, {min:35, rate:15}, {min:0, rate:10} ]; // blijheid ≥60 → −20/dag · 35–59 → −15 · <35 → −10 (streng)
const HAPPY_HABIT_BOOST = 3;     // eiwit- of stappen-dagdoel 100% → alle dieren +3 (sporten blijft dominant)
const HAPPY_KNUFFEL_BOOST = 3;   // dagelijkse knuffelronde → alle dieren +3
const HAPPY_ZOO_BONUS_MIN = 75, HAPPY_ZOO_BONUS_PCT = 0.10;   // blije zoo (gem. ≥75%) → +10% Pootjes op sessies
const HAPPY_SAD_THRESHOLD = 40;  // groep-gemiddelde onder dit → "ze missen je"-signaal
const GROW_PER_DAY = 0.15;       // dieren groeien vanzelf op (~4 dagen van baby naar volwassen)
const SPORT_BOOST  = { hardlopen:75, gym:75, hiit:100, padel:30 }; // padel heeft geen eigen groep → klein boost voor iedereen
const TYPE_MS    = { gym:"p", hardlopen:"l", hiit:"a", padel:"t" };

/* ============================================================
   NAVIGATIE — tabs
   ============================================================ */
let CURRENT_TAB = "vandaag";
function go(tab){
  if(typeof stopZooAnim==="function") stopZooAnim();   // stop loop bij verlaten zoo
  CURRENT_TAB = tab;
  document.querySelectorAll("#tabs button, #botnav button").forEach(b=> b.classList.toggle("active", b.dataset.tab===tab));
  document.querySelectorAll("section.panel").forEach(p=> p.classList.remove("active"));
  const sec = el("tab-"+tab); if(sec) sec.classList.add("active");
  const pp=el("pootjesPillVal"); if(pp) pp.textContent=fmt(S.game.pootjes);
  renderTab(tab);
  window.scrollTo({top:0, behavior:"smooth"});
}
function renderTab(tab){
  if(tab==="vandaag") renderVandaag();
  else if(tab==="week") renderWeek();
  else if(tab==="voortgang") renderVoortgang();
  else if(tab==="zoo") renderZoo();
  else if(tab==="logboek") renderLogboek();
}
document.querySelectorAll("#tabs, #botnav").forEach(nav=>{
  nav.addEventListener("click", ev=>{ const b=ev.target.closest("button"); if(b) go(b.dataset.tab); });
});

/* ============================================================
   TOAST · CONFETTI · MODAL  (gedeelde micro-interacties)
   ============================================================ */
function toast(emoji, text, kind){
  const t=document.createElement("div");
  t.className="toast"+(kind==="party"?" party":kind==="good"?" good":"");
  t.innerHTML=`<span class="te">${emoji||"✨"}</span><span>${text}</span>`;
  el("toasts").appendChild(t);
  setTimeout(()=>{ t.style.animation="toastout .3s forwards"; setTimeout(()=>t.remove(),300); }, kind==="party"?3200:2400);
}
let modalLocked=false;
function openModal(html, wide, locked){
  const m=el("modal"); m.className="modal"+(wide?" wide":""); m.innerHTML=html;
  modalLocked=!!locked;
  el("overlay").classList.add("show");
}
function closeModal(force){
  if(modalLocked && !force) return;          // niet-wegklikbare modal (bv. onboarding)
  modalLocked=false;
  el("overlay").classList.remove("show"); if(typeof demoTimer!=="undefined"&&demoTimer){ clearInterval(demoTimer); demoTimer=null; }
}
/* tweede laag — sub-modal bovenop een open modal (bv. oefening-demo), sluit alleen zichzelf */
function openSubModal(html, wide){ const m=el("modal2"); m.className="modal"+(wide?" wide":""); m.innerHTML=html; el("overlay2").classList.add("show"); }
function closeSubModal(){ el("overlay2").classList.remove("show"); el("modal2").innerHTML=""; if(typeof demoTimer!=="undefined"&&demoTimer){ clearInterval(demoTimer); demoTimer=null; } }
el("overlay").addEventListener("click", e=>{ if(e.target===el("overlay")) closeModal(); });
el("overlay2").addEventListener("click", e=>{ if(e.target===el("overlay2")) closeSubModal(); });
document.addEventListener("keydown", e=>{ if(e.key==="Escape"){ if(el("overlay2").classList.contains("show")) closeSubModal(); else closeModal(); } });

/* confetti — canvas particles in roze-tinten */
const confettiCanvas = el("confetti");
const cctx = confettiCanvas.getContext("2d");
let confettiParticles = [], confettiRAF = null;
function sizeConfetti(){ confettiCanvas.width=innerWidth; confettiCanvas.height=innerHeight; }
addEventListener("resize", sizeConfetti); sizeConfetti();
function confetti(power){
  sizeConfetti();
  const colors=["#ff4d97","#ff85b8","#e0218a","#c084fc","#3ad9b3","#ffd16a","#ff2d78"];
  const n=power||90;
  for(let i=0;i<n;i++){
    confettiParticles.push({
      x: innerWidth/2 + (Math.random()-.5)*innerWidth*.5,
      y: innerHeight*.32 + (Math.random()-.5)*60,
      vx:(Math.random()-.5)*9, vy:Math.random()*-9-4,
      g:.22+Math.random()*.12, size:5+Math.random()*7,
      rot:Math.random()*6.28, vr:(Math.random()-.5)*.3,
      color:colors[(Math.random()*colors.length)|0], life:0, max:90+Math.random()*50,
      shape: Math.random()<.5?"rect":"circ"
    });
  }
  confettiCanvas.style.display="block";
  if(!confettiRAF) confettiRAF=requestAnimationFrame(stepConfetti);
}
function stepConfetti(){
  cctx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);
  confettiParticles = confettiParticles.filter(p=>p.life<p.max && p.y<innerHeight+40);
  confettiParticles.forEach(p=>{
    p.life++; p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.vx*=.99; p.rot+=p.vr;
    const a=1-(p.life/p.max);
    cctx.save(); cctx.globalAlpha=Math.max(0,a); cctx.translate(p.x,p.y); cctx.rotate(p.rot); cctx.fillStyle=p.color;
    if(p.shape==="rect") cctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*.6);
    else { cctx.beginPath(); cctx.arc(0,0,p.size/2,0,6.28); cctx.fill(); }
    cctx.restore();
  });
  if(confettiParticles.length) confettiRAF=requestAnimationFrame(stepConfetti);
  else { confettiRAF=null; confettiCanvas.style.display="none"; }
}

let audioCtx=null;
function chime(kind){
  if(!S.profile.geluid) return;
  try{
    audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
    const notes = kind==="party"?[523,659,784,1047]:[659,880];
    notes.forEach((f,i)=>{
      const o=audioCtx.createOscillator(), g=audioCtx.createGain();
      o.type="sine"; o.frequency.value=f;
      o.connect(g); g.connect(audioCtx.destination);
      const t=audioCtx.currentTime+i*0.09;
      g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(.16,t+.02); g.gain.exponentialRampToValueAtTime(.0001,t+.3);
      o.start(t); o.stop(t+.32);
    });
  }catch(e){}
}

/* ============================================================
   SVG-ENGINE  (hergebruikt & uitgebreid uit referentie)
   ============================================================ */
let _cid=0; function cid(){ return "g"+(++_cid); }
function smoothPath(pts){
  if(!pts.length) return "";
  if(pts.length<2) return `M${pts[0][0]},${pts[0][1]}`;
  let d=`M${pts[0][0]},${pts[0][1]}`;
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[i-1]||pts[i], p1=pts[i], p2=pts[i+1], p3=pts[i+2]||p2;
    const c1x=p1[0]+(p2[0]-p0[0])/6, c1y=p1[1]+(p2[1]-p0[1])/6;
    const c2x=p2[0]-(p3[0]-p1[0])/6, c2y=p2[1]-(p3[1]-p1[1])/6;
    d+=` C${c1x.toFixed(1)},${c1y.toFixed(1)} ${c2x.toFixed(1)},${c2y.toFixed(1)} ${p2[0].toFixed(1)},${p2[1].toFixed(1)}`;
  }
  return d;
}
function areaChart(series,labels,opt){
  opt=opt||{};
  const W=opt.w||620, H=opt.h||220, padL=opt.padL!=null?opt.padL:36, padR=opt.padR!=null?opt.padR:16, padT=14, padB=26;
  const iw=W-padL-padR, ih=H-padT-padB;
  let max=opt.max||0, dataMin=Infinity;
  series.forEach(s=>s.data.forEach(v=>{ if(v!=null){ if(v>max)max=v; if(v<dataMin)dataMin=v; } }));
  if(!isFinite(dataMin)) dataMin=0;
  let min;
  if(opt.min!=null){ min=opt.min; if(max<=min)max=min+1; max=min+(max-min)*(opt.tight?1.06:1.12); }
  else if(opt.tight){ const span=(max-dataMin)||1; min=dataMin-span*0.12; max=max+span*0.12; }   // zoom op databereik
  else { min=0; if(max<=0)max=1; max=max*1.12; }
  const nx=labels.length;
  const X=i=> padL + (nx<=1?iw/2:iw*i/(nx-1));
  const Y=v=> padT + ih - ((v-min)/(max-min))*ih;
  let defs="", body="", grid="";
  const ticks=opt.yTicks||4;
  const yRange=max-min;
  const yDec = yRange<0.6 ? 2 : (yRange<5 ? 1 : 0);
  const yfmt = opt.yFmt || (v=>fmt(v, yDec));   // range-bewuste decimalen → geen dubbele "70 70 70"
  let lastYLab=null;
  for(let t=0;t<=ticks;t++){
    const yy=padT+ih*t/ticks; const val=min+(max-min)*(1-t/ticks);
    grid+=`<line x1="${padL}" y1="${yy.toFixed(1)}" x2="${W-padR}" y2="${yy.toFixed(1)}" stroke="rgba(255,255,255,.06)" stroke-width="1"/>`;
    const ylab=yfmt(val);
    if(ylab!==lastYLab){ grid+=`<text x="${padL-7}" y="${(yy+3.5).toFixed(1)}" fill="#a06f8c" font-size="10" text-anchor="end" font-family="inherit">${ylab}</text>`; lastYLab=ylab; }
  }
  let marker="";
  if(opt.markerIdx!=null && opt.markerIdx>=0 && opt.markerIdx<nx){
    const mx=X(opt.markerIdx);
    marker=`<line x1="${mx.toFixed(1)}" y1="${padT}" x2="${mx.toFixed(1)}" y2="${padT+ih}" stroke="rgba(255,77,151,.5)" stroke-width="1.5" stroke-dasharray="3 3"/>`;
  }
  series.forEach(s=>{
    const pts=s.data.map((v,i)=> v==null?null:[X(i),Y(v)]).filter(Boolean);
    if(!pts.length) return;
    const line=smoothPath(pts);
    if(s.fill){
      const gid=cid();
      defs+=`<linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="${s.fill[0]}" stop-opacity="${s.fillOp!=null?s.fillOp:.4}"/>
        <stop offset="1" stop-color="${s.fill[1]||s.fill[0]}" stop-opacity="0"/></linearGradient>`;
      const last=pts[pts.length-1], first=pts[0];
      body+=`<path d="${line} L${last[0].toFixed(1)},${(padT+ih).toFixed(1)} L${first[0].toFixed(1)},${(padT+ih).toFixed(1)} Z" fill="url(#${gid})"/>`;
    }
    body+=`<path d="${line}" fill="none" stroke="${s.stroke}" stroke-width="${s.width||2.6}" ${s.dashed?'stroke-dasharray="5 4"':''} stroke-linecap="round" stroke-linejoin="round" style="filter:drop-shadow(0 3px 8px ${s.glow||'rgba(0,0,0,.3)'})"/>`;
    if(s.dots) pts.forEach(p=> body+=`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3" fill="${s.stroke}" stroke="#26121f" stroke-width="1.5"/>`);
    if(s.endDot){ const p=pts[pts.length-1]; body+=`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="4.5" fill="${s.stroke}" stroke="#26121f" stroke-width="2.5"/>`; }
  });
  let xl="";
  labels.forEach((l,i)=>{ if(opt.everyLabel && i%opt.everyLabel!==0 && i!==nx-1) return;
    xl+=`<text x="${X(i).toFixed(1)}" y="${H-7}" fill="#a06f8c" font-size="10" text-anchor="middle" font-family="inherit">${l}</text>`; });
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" style="display:block"><defs>${defs}</defs>${grid}${marker}${body}${xl}</svg>`;
}
function roundedBarPath(x,y,bw,h,rad){
  rad=Math.min(rad,bw/2,h);
  return `M${x.toFixed(1)},${(y+rad).toFixed(1)} a${rad},${rad} 0 0 1 ${rad},${-rad} l${(bw-2*rad).toFixed(1)},0 a${rad},${rad} 0 0 1 ${rad},${rad} l0,${(h-rad).toFixed(1)} l${(-bw).toFixed(1)},0 Z`;
}
function barChart(bars,opt){
  opt=opt||{};
  const W=opt.w||620, H=opt.h||210, padL=opt.padL!=null?opt.padL:32, padR=10, padT=18, padB=26;
  const iw=W-padL-padR, ih=H-padT-padB;
  let max=opt.max||0; bars.forEach(b=>{ if(b.value>max)max=b.value; if((b.plan||0)>max)max=b.plan; });
  if(max<=0) max=1; max=max*1.16;
  const n=bars.length||1, gap=opt.gap!=null?opt.gap:0.34;
  const bw=iw/n*(1-gap), step=iw/n;
  const ticks=opt.yTicks||4;
  let grid="";
  for(let t=0;t<=ticks;t++){ const yy=padT+ih*t/ticks; const val=max*(1-t/ticks);
    grid+=`<line x1="${padL}" y1="${yy.toFixed(1)}" x2="${W-padR}" y2="${yy.toFixed(1)}" stroke="rgba(255,255,255,.06)"/>`;
    grid+=`<text x="${padL-6}" y="${(yy+3.5).toFixed(1)}" fill="#a06f8c" font-size="10" text-anchor="end" font-family="inherit">${Math.round(val)}</text>`; }
  let defs="", ghost="", body="";
  bars.forEach((b,i)=>{
    const x=padL+step*i+(step-bw)/2;
    const g=b.grad||["#ff85b8","#ff4d97"];
    body+=`<text x="${(x+bw/2).toFixed(1)}" y="${H-7}" fill="#a06f8c" font-size="10" text-anchor="middle" font-family="inherit">${b.label}</text>`;
    const plan=b.plan||0;
    if(plan>0){ const ph=Math.max(2,(plan/max)*ih), py=padT+ih-ph;
      ghost+=`<path d="${roundedBarPath(x,py,bw,ph,6)}" fill="${g[0]}" fill-opacity=".13" stroke="${g[0]}" stroke-opacity=".3" stroke-width="1" stroke-dasharray="3 2.5"/>`; }
    if(b.value>0){ const h=Math.max(2,(b.value/max)*ih), y=padT+ih-h; const gid=cid();
      defs+=`<linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${g[0]}"/><stop offset="1" stop-color="${g[1]}" stop-opacity="${b.hi?1:.82}"/></linearGradient>`;
      body+=`<path d="${roundedBarPath(x,y,bw,h,6)}" fill="url(#${gid})" ${b.hi?'style="filter:drop-shadow(0 4px 12px rgba(255,77,151,.5))"':''}/>`;
      body+=`<text x="${(x+bw/2).toFixed(1)}" y="${(y-6).toFixed(1)}" fill="#fdeef6" font-size="10" font-weight="700" text-anchor="middle" font-family="inherit">${opt.fmt?opt.fmt(b.value):b.value}</text>`;
    } else if(plan>0){ const ph=Math.max(2,(plan/max)*ih), py=padT+ih-ph;
      body+=`<text x="${(x+bw/2).toFixed(1)}" y="${(py-6).toFixed(1)}" fill="#a06f8c" font-size="10" font-weight="500" text-anchor="middle" font-family="inherit">${opt.fmt?opt.fmt(plan):plan}</text>`; }
  });
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" style="display:block"><defs>${defs}</defs>${grid}${ghost}${body}</svg>`;
}
function donutChart(segs,centerBig,centerSmall,size){
  const S0=size||168, r=S0/2-16, cx=S0/2, cy=S0/2, C=2*Math.PI*r, sw=18;
  const tot=segs.reduce((a,s)=>a+s.value,0)||1; let off=0, arcs="";
  segs.forEach(s=>{ const frac=s.value/tot, len=frac*C;
    arcs+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${sw}" stroke-linecap="round"
      stroke-dasharray="${(len-3).toFixed(1)} ${(C-len+3).toFixed(1)}" stroke-dashoffset="${(-off).toFixed(1)}"
      transform="rotate(-90 ${cx} ${cy})" style="filter:drop-shadow(0 2px 6px rgba(0,0,0,.4))"/>`; off+=len; });
  return `<svg viewBox="0 0 ${S0} ${S0}" width="${S0}" height="${S0}" style="display:block">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,.05)" stroke-width="${sw}"/>${arcs}
    <text x="${cx}" y="${cy-2}" fill="#fdeef6" font-size="26" font-weight="800" text-anchor="middle" font-family="inherit" letter-spacing="-1">${centerBig}</text>
    <text x="${cx}" y="${cy+16}" fill="#a06f8c" font-size="11" text-anchor="middle" font-family="inherit">${centerSmall||''}</text></svg>`;
}
/* ring met gradient — pct 0..100, met optioneel centertekst */
function ring(pct,size,opt){

    <linearGradient id="${gid}" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="${c0}"/><stop offset="1" stop-color="${c1}"/></linearGradient></defs>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="${sw}"/>

      stroke-dasharray="${len.toFixed(1)} ${(C-len).toFixed(1)}" transform="rotate(-90 ${cx} ${cy})" style="filter:drop-shadow(0 2px 8px rgba(255,77,151,.4));transition:stroke-dasharray .6s"/>
    ${opt.big!=null?`<text x="${cx}" y="${cy+(opt.sub?-2:6)}" fill="#fdeef6" font-size="${opt.bigSize||22}" font-weight="800" text-anchor="middle" font-family="inherit" letter-spacing="-.5">${opt.big}</text>`:""}
    ${opt.sub?`<text x="${cx}" y="${cy+15}" fill="#a06f8c" font-size="10.5" text-anchor="middle" font-family="inherit">${opt.sub}</text>`:""}
  </svg>`;
}
function ringMini(pct,size){

/* sparkline mini-grafiek (voor 1RM e.d.) */
function sparkline(data,opt){
  opt=opt||{}; const W=opt.w||140,H=opt.h||40,pad=4;
  const vals=data.filter(isNum).map(Number); if(vals.length<2) return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}"></svg>`;
  let mn=Math.min(...vals),mx=Math.max(...vals); if(mx<=mn)mx=mn+1;
  const X=i=>pad+(W-2*pad)*i/(data.length-1), Y=v=>pad+(H-2*pad)*(1-(v-mn)/(mx-mn));
  const pts=data.map((v,i)=>isNum(v)?[X(i),Y(Number(v))]:null).filter(Boolean);
  const gid=cid();
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" preserveAspectRatio="none" style="display:block"><defs>
    <linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${opt.color||'#ff85b8'}" stop-opacity=".34"/><stop offset="1" stop-color="${opt.color||'#ff85b8'}" stop-opacity="0"/></linearGradient></defs>
    <path d="${smoothPath(pts)} L${pts[pts.length-1][0].toFixed(1)},${H-pad} L${pts[0][0].toFixed(1)},${H-pad} Z" fill="url(#${gid})"/>
    <path d="${smoothPath(pts)}" fill="none" stroke="${opt.color||'#ff85b8'}" stroke-width="2" stroke-linecap="round"/>
    <circle cx="${pts[pts.length-1][0].toFixed(1)}" cy="${pts[pts.length-1][1].toFixed(1)}" r="2.6" fill="${opt.color||'#ff85b8'}"/></svg>`;
}

/* ============================================================
   POOTJES & SESSIE-HOOK  (basis nu; spel breidt uit in fase 5)
   ============================================================ */
function addPootjes(n, reden){
  n=Math.round(n); if(!n) return;
  S.game.pootjes = Math.max(0, S.game.pootjes + n);
}
/* streak: traint ze vandaag, +1; rustdagen breken niet binnen marge (max 2 rust/7d) */
function updateStreak(datum){
  const g=S.game;
  if(g.streakLaatste===datum) return; // al geteld vandaag
  if(!g.streakLaatste){ g.streakDagen=1; g.streakLaatste=datum; return; }
  const gap=daysBetween(g.streakLaatste, datum);
  if(gap<=0) return; // terug-gedateerde sessie: anker niet achteruit schuiven
  if(gap<=3){ g.streakDagen+=1; } // tot 2 rustdagen ertussen = geen breuk
  else { g.streakDagen=1; }
  g.streakLaatste=datum;
}
/* Pootjes-basis = duur × intensiteitsfactor (laag 3 / matig 5 / hoog 7), losgekoppeld van RPE
   zodat de munt-economie niet door RPE wordt opgeblazen. Belasting (sessLoad) blijft RPE-gebaseerd. */
function sessPootjesBase(s){ const dur=num(s.duur); if(!dur) return 0; return Math.round(dur*(INTFACT[s.intensiteit]||5)); }
/* centrale hook na het loggen van een sessie. Perks + bonussen (fase 5). */
function onSessionLogged(s, opts){
  opts=opts||{};
  const base = sessPootjesBase(s);
  const prs = (typeof newPRsFromSession==="function") ? newPRsFromSession(s) : [];
  updateStreak(s.datum);
  let earned = base, messages=[];
  if(typeof gameAfterSession==="function"){
    const r = gameAfterSession(s, {prs, base}) || {};
    earned += (r.bonus||0); messages = r.messages||[];
  }
  s.pootjesVerdiend = earned;
  addPootjes(earned, "sessie");
  save();
  checkWeekChallenge();
  if(!opts.silent){
    toast("🐾", `+${earned} Pootjes — ${TYPE_LABEL[s.type]||"sessie"} gelogd!`, "good");
    prs.forEach((pr,i)=> setTimeout(()=>celebrate(pr.text,130), 300+i*150));
    messages.forEach((m,i)=> setTimeout(()=>toast(m.icon||"✨", m.text, m.party?"party":"good"), 240+i*170));
    if(!prs.length && earned>=40) confetti(40);
  }
  if(typeof checkMilestones==="function") checkMilestones();
  refreshChrome();
}

function newSlot(kind, sub, label, type){ return {id:uid("sl"), kind, sub, label, type, status:"open", sessionId:null, dag:null}; }
function defaultProposal(monday){
  return {
    weekStart: monday,
    slots: [
      newSlot("gym","bootyA","Booty A","gym"),
      newSlot("gym","bootyB","Booty B","gym"),

      newSlot("run","lang","Langere duurloop","hardlopen"),
      newSlot("hiit","klas","HIIT-klasje","hiit")
    ],
    uitleg: [],   // engine vult dit in fase 3 (wat aangepast en waarom)
    deload: false
  };
}
function ensureWeek(){
  const mon=thisMonday();
  if(!S.week || S.week.weekStart!==mon){
    S.week = (typeof generateWeekProposal==="function") ? generateWeekProposal(mon) : defaultProposal(mon);
    save();
  }
  return S.week;
}
function weekDoneCount(){ return S.week ? S.week.slots.filter(s=>s.status==="done").length : 0; }
function weekTargetCount(){ return 5; }

const GYM_SUBS = {bootyA:"Booty A", bootyB:"Booty B", upper:"Upperbody"};
function slotTemplateId(slot){ return slot.kind==="gym" ? (slot.sub==="bootyA"?"bootyA":slot.sub==="bootyB"?"bootyB":"upper") : null; }
function slotAdvies(slot){
  // fase 3 engine vult rijk advies; fase 2 geeft een zinnig startpunt
  if(typeof engineSlotAdvies==="function") return engineSlotAdvies(slot);
  if(slot.kind==="run"){
    const lastLong = maxOf(S.sessions.filter(s=>s.type==="hardlopen"), s=>s.km);
    if(slot.sub==="lang") return {km: lastLong? Math.round((lastLong+0.5)*2)/2 : 5, type:"lang", note:RUN_TYPES.lang.note};
    return {km: 4, type:"rustig", note:RUN_TYPES.rustig.note};
  }
  if(slot.kind==="hiit") return {note:"Vrij klasje — altijd anders."};
  return {note:""};
}

  const slot=S.week.slots.find(x=>x.id===slotId); if(!slot)return;

/* ============================================================
   GYM SET-LOGGER  (geheugen per oefening)
   ============================================================ */
function lastGymSession(templateId){
  return [...S.sessions].filter(s=>s.type==="gym" && s.templateId===templateId).sort((a,b)=>b.datum.localeCompare(a.datum))[0];
}
function exMemFor(exId){ return S.exMemory[exId]; }   // {sets:[{reps,kg}], datum}
function openGymLogger(slotId){
  const slot=slotId? S.week.slots.find(x=>x.id===slotId):null;
  const tmplId = slot? slotTemplateId(slot) : "bootyA";
  const tmpl=getTemplates()[tmplId];
  // bestaande sessie aan dit slot? dan bewerken
  const existing = slot && slot.sessionId ? S.sessions.find(s=>s.id===slot.sessionId) : null;
  LOGGER = {
    type:"gym", slotId, templateId:tmplId, sessionId: existing?existing.id:null,
    datum: existing?existing.datum:todayISO(),
    intensiteit: existing?existing.intensiteit:"matig",
    duur: existing?existing.duur:"",
    rpe: existing?existing.rpe:"",
    cardio: existing ? (existing.cardio || (existing.wandelblok ? Object.assign({type:"incline"}, existing.wandelblok) : null)) : null,
    abs: existing ? (existing.abs||null) : null,
    exercises: existing ? existing.oefeningen.map(o=>({exId:o.exId, naam:o.naam, groot:exById(o.exId).groot, sets:o.sets.map(s=>({reps:s.reps,kg:s.kg}))}))
      : tmpl.oef.map(o=>{ const ex=exById(o.exId); const mem=exMemFor(o.exId);
          const sets=Array.from({length:o.sets},(_,k)=>({reps: mem&&mem.sets[k]?mem.sets[k].reps:"", kg: mem&&mem.sets[k]?mem.sets[k].kg:""}));
          return {exId:o.exId, naam:ex.naam, groot:ex.groot, lo:o.lo, hi:o.hi, perLeg:ex.perLeg, bw:ex.bw, sets};
        }),
    rec: existing?existing.rec:{}
  };
  renderGymLogger(tmpl.naam);
  syncIntens();
}
function renderGymLogger(naam){
  const L=LOGGER, tmpl=getTemplates()[L.templateId];
  const exHtml = L.exercises.map((ex,ei)=>{
    const mem=exMemFor(ex.exId);
    const tdef=tmpl.oef.find(o=>o.exId===ex.exId);
    const adv = (typeof adviseExercise==="function") ? adviseExercise(ex.exId, tdef) : null;
    const repRange = (ex.lo&&ex.hi)?(ex.lo===ex.hi?ex.lo:ex.lo+"–"+ex.hi):"";
    const setsHtml = ex.sets.map((st,si)=>{
      const prev = mem&&mem.sets[si] ? `${mem.sets[si].reps||"–"}×${mem.sets[si].kg||"–"}kg` : "—";
      return `<div style="display:grid;grid-template-columns:26px 1fr 1fr 70px 26px;gap:7px;align-items:center;margin-bottom:6px">
        <span style="font-size:11px;color:var(--mut);font-weight:700;text-align:center">${si+1}</span>
        <input type="number" inputmode="numeric" placeholder="reps" value="${st.reps??""}" id="gx_${ei}_${si}_r" style="padding:8px 9px">
        <input type="number" inputmode="decimal" step="0.25" placeholder="kg${ex.bw?" (bw)":""}" value="${st.kg??""}" id="gx_${ei}_${si}_k" style="padding:8px 9px">
        <span style="font-size:10.5px;color:var(--mut);text-align:right">${prev}</span>
        <button onclick="gymRemoveSet(${ei},${si})" title="set weg" style="font:inherit;background:none;border:none;color:var(--mut);cursor:pointer;font-size:15px">✕</button>
      </div>`;
    }).join("");
    return `<div style="background:var(--bg-soft);border:1px solid var(--line);border-radius:13px;padding:12px;margin-bottom:9px">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px">
        <div style="font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px;flex-wrap:wrap">${ex.icon||exById(ex.exId).icon||"•"} ${esc(ex.naam)}
          <button class="ex-help" onclick="openExerciseDemo('${ex.exId}')" title="Hoe doe ik deze oefening?">?</button>
          ${repRange?`<span style="font-size:11px;color:var(--mut);font-weight:500">· ${repRange}${ex.perLeg?" /been":""} reps</span>`:""}</div>
        <button onclick="gymRemoveExercise(${ei})" style="font:inherit;font-size:11px;background:none;border:none;color:var(--mut);cursor:pointer">verwijder</button>
      </div>
      ${adv?`<div class="chip pink" style="margin-bottom:8px">💡 ${esc(adv.text)}</div>`:""}
      <div style="display:grid;grid-template-columns:26px 1fr 1fr 70px 26px;gap:7px;margin-bottom:5px">
        <span></span><span class="fl" style="margin:0">Reps</span><span class="fl" style="margin:0">Kg</span><span class="fl" style="margin:0;text-align:right">Vorige</span><span></span></div>
      ${setsHtml}
      <button class="btn sm ghost" onclick="gymAddSet(${ei})" style="margin-top:4px">+ set</button>
    </div>`;
  }).join("");

  openModal(`${logHeader("🏋️‍♀️ "+esc(naam)+" loggen","Vul per set je reps en kg. Naast elke set zie je wat je vorige keer deed — pak 'm terug. 💪","lg_datum",L.datum)}
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
      <button class="btn sm ghost" onclick="gymRepeatLast()">🔁 Herhaal vorige sessie</button>
      <button class="btn sm ghost" onclick="gymAddExercisePrompt()">+ Oefening</button>
    </div>
    <div id="gymExList">${exHtml}</div>
    <div class="frow c3" style="margin-top:6px">
      <div class="field"><label>Duur (min)</label><input id="lg_duur" type="number" value="${L.duur??""}" placeholder="bv. 55"></div>
      <div class="field"><label>RPE 1-10</label><input id="lg_rpe" type="number" min="1" max="10" value="${L.rpe??""}" placeholder="hoe zwaar"></div>
      <div class="field"><label>Cardio-finisher</label><button class="btn sm ghost block" onclick="gymToggleCardio()" id="cardioBtn">${L.cardio?"✓ "+cardioLabel(L.cardio.type):"+ Cardio toevoegen"}</button></div>
    </div>
    <div id="cardioFields">${L.cardio?cardioFieldsHtml(L.cardio):""}</div>
    <div class="frow c2" style="margin-top:2px;align-items:end">
      <div class="field"><label>Buikspier blok</label><button class="btn sm ghost block" onclick="gymToggleAbs()" id="absBtn">${L.abs?"✓ Buikspieren aan":"+ Buikspier blok"}</button></div>
      <div class="field" id="absField">${L.abs?`<label>Duur (min)</label><input id="lg_abs_dur" type="number" value="${L.abs.duur??10}" placeholder="bv. 10">`:`<label>&nbsp;</label><div style="font-size:11.5px;color:var(--mut);padding-top:9px">Korte core-finisher? Voeg 'm toe.</div>`}</div>
    </div>
    ${recoveryFields(L.rec)}
    <div class="factions" style="margin-top:14px">
      <button class="btn" onclick="saveGymSession()">${L.sessionId?"Bijwerken":"Opslaan als gedaan ✓"}</button>
      <button class="btn ghost" onclick="closeModal()">Sluiten</button>
    </div>`, true);
  syncIntens();
}
const CARDIO_TYPES = { incline:{label:"Incline-wandel", icon:"🚶‍♀️"}, stairmaster:{label:"Stairmaster", icon:"🪜"}, rennen:{label:"Rennen", icon:"🏃‍♀️"} };
function cardioLabel(t){ return (CARDIO_TYPES[t]||CARDIO_TYPES.incline).label; }
function cardioFieldsHtml(c){
  c=c||{type:"incline"};
  const tabs=Object.keys(CARDIO_TYPES).map(t=>`<button onclick="gymCardioType('${t}')" class="${c.type===t?'on':''}">${CARDIO_TYPES[t].icon} ${CARDIO_TYPES[t].label}</button>`).join("");
  let f="";
  if(c.type==="incline") f=`<div class="frow c3">
      <div class="field"><label>Incline (%)</label><input id="lg_c_incline" type="number" step="0.5" value="${c.incline??12}"></div>
      <div class="field"><label>Snelheid (km/u)</label><input id="lg_c_spd" type="number" step="0.1" value="${c.snelheid??4.8}"></div>
      <div class="field"><label>Duur (min)</label><input id="lg_c_dur" type="number" value="${c.duur??30}"></div></div>
      <div class="cardsub" style="margin:4px 0 0">12-3-30: 12% incline, ~4,8 km/u, 30 min (of 15 min kort).</div>`;
  else if(c.type==="stairmaster") f=`<div class="frow c2">
      <div class="field"><label>Level</label><input id="lg_c_level" type="number" step="1" value="${c.level??7}"></div>
      <div class="field"><label>Duur (min)</label><input id="lg_c_dur" type="number" value="${c.duur??20}"></div></div>`;
  else f=`<div class="frow c3">
      <div class="field"><label>Snelheid (km/u)</label><input id="lg_c_spd" type="number" step="0.1" value="${c.snelheid??8}"></div>
      <div class="field"><label>Afstand (km)</label><input id="lg_c_afst" type="number" step="0.1" value="${c.afstand??""}"></div>
      <div class="field"><label>Duur (min)</label><input id="lg_c_dur" type="number" value="${c.duur??15}"></div></div>`;
  return `<div style="background:var(--bg-soft);border:1px solid var(--line);border-radius:12px;padding:11px;margin:2px 0 8px">
    <div class="seg" style="margin-bottom:9px;flex-wrap:wrap">${tabs}</div>${f}
    <div class="cardsub" style="margin:7px 0 0">Een finisher, nooit de hoofdtraining — telt mee voor belasting en Pootjes.</div></div>`;
}
function gymToggleCardio(){ gymSyncDom(); LOGGER.cardio = LOGGER.cardio ? null : {type:"incline", incline:12, snelheid:4.8, duur:30}; renderGymLogger(getTemplates()[LOGGER.templateId].naam); }
function gymToggleAbs(){ gymSyncDom(); LOGGER.abs = LOGGER.abs ? null : {duur:10}; renderGymLogger(getTemplates()[LOGGER.templateId].naam); }
function gymCardioType(t){
  gymSyncDom(); if(!LOGGER.cardio) LOGGER.cardio={}; LOGGER.cardio.type=t;
  if(t==="incline"){ LOGGER.cardio.incline=LOGGER.cardio.incline??12; LOGGER.cardio.snelheid=LOGGER.cardio.snelheid??4.8; LOGGER.cardio.duur=LOGGER.cardio.duur??30; }
  else if(t==="stairmaster"){ LOGGER.cardio.level=LOGGER.cardio.level??7; LOGGER.cardio.duur=LOGGER.cardio.duur??20; }
  else { LOGGER.cardio.snelheid=LOGGER.cardio.snelheid??8; LOGGER.cardio.duur=LOGGER.cardio.duur??15; }
  renderGymLogger(getTemplates()[LOGGER.templateId].naam);
}
function gymSyncDom(){
  const L=LOGGER; if(!L)return;
  L.exercises.forEach((ex,ei)=>ex.sets.forEach((st,si)=>{
    const r=el(`gx_${ei}_${si}_r`), k=el(`gx_${ei}_${si}_k`);
    if(r) st.reps=r.value; if(k) st.kg=k.value;
  }));
  L.datum=el("lg_datum")?.value||L.datum;
  L.duur=el("lg_duur")?.value||""; L.rpe=el("lg_rpe")?.value||"";
  if(L.cardio){ const c=L.cardio;
    if(c.type==="incline"){ c.incline=el("lg_c_incline")?.value??c.incline; c.snelheid=el("lg_c_spd")?.value??c.snelheid; }
    else if(c.type==="stairmaster"){ c.level=el("lg_c_level")?.value??c.level; }
    else { c.snelheid=el("lg_c_spd")?.value??c.snelheid; c.afstand=el("lg_c_afst")?.value??c.afstand; }
    c.duur=el("lg_c_dur")?.value||c.duur||15;
  }
  if(L.abs){ L.abs.duur = el("lg_abs_dur")?.value || L.abs.duur || 10; }
  L.rec=readRecovery();
}
function gymAddSet(ei){ gymSyncDom(); LOGGER.exercises[ei].sets.push({reps:"",kg:""}); renderGymLogger(getTemplates()[LOGGER.templateId].naam); }
function gymRemoveSet(ei,si){ gymSyncDom(); if(LOGGER.exercises[ei].sets.length>1) LOGGER.exercises[ei].sets.splice(si,1); renderGymLogger(getTemplates()[LOGGER.templateId].naam); }
function gymRemoveExercise(ei){ gymSyncDom(); LOGGER.exercises.splice(ei,1); renderGymLogger(getTemplates()[LOGGER.templateId].naam); }
function gymRepeatLast(){
  const last=lastGymSession(LOGGER.templateId);
  if(!last){ toast("🤔","Nog geen vorige "+getTemplates()[LOGGER.templateId].naam+"-sessie om te herhalen."); return; }
  gymSyncDom();
  LOGGER.exercises = last.oefeningen.map(o=>({exId:o.exId, naam:o.naam, groot:exById(o.exId).groot, perLeg:exById(o.exId).perLeg, bw:exById(o.exId).bw,
    sets:o.sets.map(s=>({reps:s.reps,kg:s.kg}))}));
  LOGGER.duur=last.duur||"";
  renderGymLogger(getTemplates()[LOGGER.templateId].naam);
  toast("🔁","Vorige sessie ingevuld — nu verslaan! 🔥","good");
}
function gymAddExercisePrompt(){
  gymSyncDom();
  const inLib = EXERCISE_LIB.filter(e=>!LOGGER.exercises.some(x=>x.exId===e.id));
  openModal(`<button class="x" onclick="renderGymLogger(getTemplates()[LOGGER.templateId].naam)">✕</button>
    <h2>Oefening toevoegen</h2><div class="msub">Kies uit de bibliotheek.</div>
    <div style="display:flex;flex-direction:column;gap:7px;max-height:50vh;overflow:auto">
      ${inLib.map(e=>`<button class="btn block ghost" style="justify-content:flex-start" onclick="gymAddExercise('${e.id}')">${e.icon||"•"} ${e.naam}${e.groot?' <span class="chip pink" style="margin-left:auto">groot</span>':''}</button>`).join("")}
    </div>`);
}
function gymAddExercise(exId){
  const ex=exById(exId), mem=exMemFor(exId);
  const sets=Array.from({length:3},(_,k)=>({reps:mem&&mem.sets[k]?mem.sets[k].reps:"", kg:mem&&mem.sets[k]?mem.sets[k].kg:""}));
  LOGGER.exercises.push({exId,naam:ex.naam,groot:ex.groot,perLeg:ex.perLeg,bw:ex.bw,lo:8,hi:12,sets});
  renderGymLogger(getTemplates()[LOGGER.templateId].naam);
}
function saveGymSession(){
  gymSyncDom(); const L=LOGGER;
  const oef = L.exercises.map(ex=>({exId:ex.exId, naam:ex.naam, sets: ex.sets
      .filter(s=>isNum(s.reps)||isNum(s.kg)).map(s=>({reps:num(s.reps), kg:num(s.kg)})) }))
    .filter(o=>o.sets.length);
  if(!oef.length){ toast("🤔","Vul minstens één set in om op te slaan."); return; }
  // duur schatten als leeg
  let duur=num(L.duur); if(!duur) duur = Math.max(25, Math.min(oef.reduce((a,o)=>a+o.sets.length,0)*4, 80) + (L.cardio?num(L.cardio.duur):0) + (L.abs?num(L.abs.duur):0));
  const sess = {
    id: L.sessionId||uid("s"), type:"gym", datum:L.datum, slot:L.slotId,
    templateId:L.templateId, oefeningen:oef, cardio:L.cardio, abs:L.abs,
    duur, intensiteit:L.intensiteit||"matig", rpe:L.rpe||"", ...L.rec,
    created: nowMs()
  };
  // exMemory bijwerken per oefening (laatste werkelijke sets)
  oef.forEach(o=>{ if(o.sets.length) S.exMemory[o.exId]={sets:o.sets, datum:L.datum}; });
  commitSession(sess, L.sessionId, L.slotId);
  // PR-check (fase 4/5 breidt uit); hier al een vlag voor confetti bij zwaardere hip thrust
  closeModal();
}

function calcTempo(km, min){ if(!km||!min) return ""; const p=min/km; const m=Math.floor(p), s=Math.round((p-m)*60); return `${m}:${pad2(s)} /km`; }
function openRunLogger(slotId){
  const slot=slotId? S.week.slots.find(x=>x.id===slotId):null;
  const existing = slot && slot.sessionId ? S.sessions.find(s=>s.id===slot.sessionId):null;
  const adv = slot? slotAdvies(slot):{km:4,type:"rustig"};
  LOGGER={ type:"hardlopen", slotId, sessionId: existing?existing.id:null,
    datum: existing?existing.datum:todayISO(),
    intensiteit: existing?existing.intensiteit:(slot&&slot.sub==="interval"?"hoog":slot&&slot.sub==="tempo"?"matig":"laag"),
    looptype: existing?existing.looptype:(slot?slot.sub:adv.type||"rustig"),
    rec: existing?{vermoeidheid:existing.vermoeidheid,spierpijn:existing.spierpijn,slaapuren:existing.slaapuren,slaapkw:existing.slaapkw,stemming:existing.stemming,garmin:existing.garmin,opm:existing.opm}:{} ,
    km: existing?existing.km:(adv.km||""), tijd: existing?existing.tijd:"", hr: existing?existing.hr:""
  };
  openModal(`${logHeader("🏃‍♀️ Hardlopen loggen","Run-walk mag altijd. Vul in wat je deed — tempo reken ik voor je uit.","lg_datum",LOGGER.datum)}
    <div class="field" style="margin-bottom:10px"><label>Type loop</label>
      <div class="seg" id="lg_loop">${Object.keys(RUN_TYPES).map(k=>`<button data-v="${k}" onclick="pickLoop('${k}')">${RUN_TYPES[k].icon} ${RUN_TYPES[k].label}</button>`).join("")}</div></div>
    <div class="frow c3">
      <div class="field"><label>Afstand (km)</label><input id="lg_km" type="number" step="0.1" value="${LOGGER.km??""}" oninput="updTempo()"></div>
      <div class="field"><label>Tijd (min)</label><input id="lg_tijd" type="number" step="0.1" value="${LOGGER.tijd??""}" oninput="updTempo()"></div>
      <div class="field"><label>Gem. hartslag</label><input id="lg_hr" type="number" value="${LOGGER.hr??""}" placeholder="bpm (optioneel)"></div>
    </div>
    <div class="chip pink" id="tempoChip" style="margin-bottom:8px">${calcTempo(num(LOGGER.km),num(LOGGER.tijd))||"tempo verschijnt hier"}</div>

      <button class="btn ghost" onclick="closeModal()">Sluiten</button>
    </div>`);
  setTimeout(()=>{ pickIntens(LOGGER.intensiteit); pickLoop(LOGGER.looptype); },0);
}
function pickLoop(v){ LOGGER.looptype=v; document.querySelectorAll("#lg_loop button").forEach(b=>b.classList.toggle("on",b.dataset.v===v)); }
function updTempo(){ const t=calcTempo(num(el("lg_km").value), num(el("lg_tijd").value)); el("tempoChip").textContent=t||"tempo verschijnt hier"; }

/* ============================================================
   SESSIE COMMIT — opslaan, slot afvinken, pootjes
   ============================================================ */
function commitSession(sess, existingId, slotId){
  const isUpdate=!!existingId;
  if(isUpdate){
    const i=S.sessions.findIndex(s=>s.id===existingId);
    const old = i>=0 ? S.sessions[i] : null;
    // verdiende Pootjes behouden en alleen het basis-verschil verrekenen als duur/intensiteit wijzigde
    const diff = sessPootjesBase(sess) - (old ? sessPootjesBase(old) : 0);
    sess.pootjesVerdiend = Math.max(0, (old ? (old.pootjesVerdiend||0) : 0) + diff);
    if(diff) addPootjes(diff, "sessie-correctie");
    if(i>=0) S.sessions[i]=sess; else S.sessions.push(sess);
    if(slotId){ const slot=S.week.slots.find(x=>x.id===slotId); if(slot){ slot.status="done"; slot.sessionId=sess.id; } }
    save(); toast("✏️","Sessie bijgewerkt."); refreshChrome();
    return;
  }
  S.sessions.push(sess);
  // slot afvinken
  if(slotId){ const slot=S.week.slots.find(x=>x.id===slotId); if(slot){ slot.status="done"; slot.sessionId=sess.id; } }
  onSessionLogged(sess); checkWeekGoalCelebration();
  fireSessionLoggedNotification(sess);
}
function checkWeekGoalCelebration(){
  if(weekDoneCount()===weekTargetCount()){
    const awarded = (typeof gameWeekGoal==="function") ? gameWeekGoal() : false;
    if(awarded) celebrate("Weekdoel gehaald — 5 van 5! Je bent een machine 🦾🎉", 150);
  }
}
