/* ============================================================
   ADAPTIEVE ENGINE  (fase 3) — regelgebaseerd, offline, transparant
   ============================================================ */

/* ---- 1RM (Epley) & PR's ---- */
function epley1RM(kg,reps){ kg=num(kg); reps=num(reps); if(!kg||!reps) return 0; return kg*(1+reps/30); }
function sessionBest1RM(s,exId){ let m=0; (s.oefeningen||[]).forEach(o=>{ if(o.exId===exId) o.sets.forEach(st=>{ m=Math.max(m,epley1RM(st.kg,st.reps)); }); }); return m; }
function gymSessionsWith(exId){ return S.sessions.filter(s=>s.type==="gym" && (s.oefeningen||[]).some(o=>o.exId===exId)); }
function best1RMForExercise(exId){
  let best=0, datum=null;
  gymSessionsWith(exId).forEach(s=>{ const m=sessionBest1RM(s,exId); if(m>best){ best=m; datum=s.datum; } });
  return {est:best, datum};
}
function best1RMExcluding(exId, exclId){ let m=0; S.sessions.filter(s=>s.type==="gym"&&s.id!==exclId).forEach(s=>{ m=Math.max(m,sessionBest1RM(s,exId)); }); return m; }
/* geschatte 1RM per sessiedatum (voor mini-grafiek) */
function oneRMSeries(exId){
  const map={};
  gymSessionsWith(exId).forEach(s=>{ const m=sessionBest1RM(s,exId); if(m>0) map[s.datum]=Math.max(map[s.datum]||0,m); });
  return Object.keys(map).sort().map(d=>({datum:d, est:map[d]}));
}
/* zwaarste werkgewicht ooit per oefening (voor PR-muur) */
function heaviestSet(exId){
  let best=0, reps=0, datum=null;
  gymSessionsWith(exId).forEach(s=>(s.oefeningen||[]).forEach(o=>{ if(o.exId===exId) o.sets.forEach(st=>{ if(num(st.kg)>best){ best=num(st.kg); reps=num(st.reps); datum=s.datum; } }); }));
  return {kg:best, reps, datum};
}

function runHistory(){ return S.sessions.filter(s=>s.type==="hardlopen").sort((a,b)=>a.datum.localeCompare(b.datum)); }
function longestRun(){ return maxOf(runHistory(), s=>s.km); }
function fastestKmPace(){ // min seconden/km over runs >=1km met tijd (tijd is in minuten)
  const paces=runHistory().filter(s=>s.km>=1 && s.tijd).map(s=>(s.tijd*60)/s.km);
  return paces.length? Math.min(...paces) : null;
}
function runWeeksConsistent(){ const byWeek={}; runHistory().forEach(s=>{ const m=mondayOf(s.datum); byWeek[m]=(byWeek[m]||0)+1; }); return Object.values(byWeek).filter(c=>c>=2).length; }
function runBaseUnlocked(){ return longestRun()>=6.5 || runWeeksConsistent()>=6 || runHistory().length>=12; }

/* ---- nieuwe PR's bij een net gelogde sessie ---- */
function newPRsFromSession(s){
  const prs=[];
  if(s.type==="gym"){
    (s.oefeningen||[]).forEach(o=>{
      const cur=sessionBest1RM(s,o.exId), prev=best1RMExcluding(o.exId,s.id);
      if(cur>0 && prev>0 && cur>prev+0.5) prs.push({kind:"kracht", exId:o.exId, est:cur, text:`Nieuwe kracht-PR op ${exById(o.exId).naam}! 🏆`});
    });
  } else if(s.type==="hardlopen"){
    const others=S.sessions.filter(x=>x.type==="hardlopen"&&x.id!==s.id);
    const longest=maxOf(others,x=>x.km);
    if(s.km>0 && longest>0 && s.km>longest) prs.push({kind:"afstand", km:s.km, text:`Nieuwe langste loop: ${fmt(s.km,1)} km! 🏅`});
    const pace = (s.km>=1 && s.tijd)? s.tijd/s.km : null;
    const otherPaces=others.filter(x=>x.km>=1&&x.tijd).map(x=>x.tijd/x.km);
    if(pace && otherPaces.length && pace<Math.min(...otherPaces)) prs.push({kind:"tempo", text:`Snelste kilometer tot nu: ${calcTempo(s.km,s.tijd)}! ⚡`});
  }
  return prs;
}

/* ---- cyclusfase-schatting ---- */
function cyclePhase(refISO){
  const p=S.profile; if(!p.cyclusAan || (!p.cyclusStart && !(S.cycle&&S.cycle.length))) return null;
  const ref=refISO||todayISO();
  const dur=Math.max(20,Math.min(40, p.cyclusDuur||28));
  let starts=((S.cycle&&S.cycle.length?S.cycle:[p.cyclusStart])||[]).filter(Boolean).slice().sort();
  if(!starts.length) return null;
  let lastStart=starts[0]; starts.forEach(s=>{ if(s<=ref) lastStart=s; });
  let dayInCycle=daysBetween(lastStart, ref);
  if(dayInCycle<0) dayInCycle=0;
  dayInCycle=dayInCycle % dur;
  const day=dayInCycle+1;
  let fase,label,icon,advies;
  if(day<=5){ fase="menstruatie"; label="menstruatie"; icon="🌑"; advies="Lichter tillen, rustige runs en mobiliteit. Luister naar je lijf."; }
  else if(day<=13){ fase="folliculair"; label="folliculaire"; icon="🌱"; advies="Goeie tijd om zwaarder te tillen en PR-pogingen te doen!"; }
  else if(day<=16){ fase="ovulatie"; label="ovulatie"; icon="☀️"; advies="Top voor intensiteit en kracht — pak je PR-pogingen."; }
  else if(day<=dur-3){ fase="luteaal"; label="luteale"; icon="🌗"; advies="Nog prima om te trainen; let wat extra op herstel."; }
  else { fase="luteaal-laat"; label="late luteale"; icon="🌙"; advies="Iets lichter, meer rust en rustige runs kan fijn zijn."; }
  return {fase,label,icon,advies,day,dur};
}

/* ---- auto-deload-detectie ---- */
function recentSessions(days){ const cut=addDays(todayISO(),-days); return S.sessions.filter(s=>s.datum>=cut); }
function shouldDeload(refMonday){
  const reasons=[]; let hard=false;
  const last7=recentSessions(7);
  const pijn=avgOf(last7,s=>s.spierpijn), verm=avgOf(last7,s=>s.vermoeidheid), slaap=avgOf(last7,s=>s.slaapuren);
  if(pijn!=null && pijn>=7){ hard=true; reasons.push({icon:"🦵",text:`Je spierpijn was een paar dagen hoog (gem. ${pijn.toFixed(1)}/10). Neem deze week iets gas terug — lichter tillen, meer rustige runs.`}); }
  if(verm!=null && verm>=7.5){ hard=true; reasons.push({icon:"😮‍💨",text:`Je vermoeidheid is hoog (gem. ${verm.toFixed(1)}/10). Een lichtere week brengt je juist verder.`}); }
  if(slaap!=null && slaap<6){ hard=true; reasons.push({icon:"😴",text:`Je slaapt kort (gem. ${slaap.toFixed(1)} u). Houd het deze week wat rustiger en slaap wat extra.`}); }
  const ph=cyclePhase(refMonday);
  if(ph && (ph.fase==="menstruatie"||ph.fase==="luteaal-laat")){ hard=true; reasons.push({icon:ph.icon,text:`Je zit in de ${ph.label} fase: iets lichter tillen en meer rustige runs of mobiliteit kan fijn zijn. Luister naar je lijf 💖`}); }
  return {deload:hard, reasons};
}

/* ---- progressie-overwinningen (positieve signalen) ---- */
function progressionWins(){
  const wins=[];
  ["hip_thrust","rdl","leg_press","smith_squat"].forEach(exId=>{
    const series=oneRMSeries(exId);
    if(series.length>=3){ const l=series.slice(-3); if(l[0].est<l[1].est && l[1].est<l[2].est)
      wins.push({icon:"🔥",text:`Je ${exById(exId).naam} ging 3 keer op rij omhoog — sterke vooruitgang, ga zo door! 💪`}); }
  });
  return wins.slice(0,2);
}

/* ---- gym-advies per oefening (regelgebaseerd) ---- */
function lastExercisePerf(exId){
  const s=gymSessionsWith(exId).sort((a,b)=>b.datum.localeCompare(a.datum))[0];
  if(!s) return null;
  const o=s.oefeningen.find(o=>o.exId===exId);
  return {sets:o.sets, rpe:s.rpe, datum:s.datum};
}
function roundQuarter(x){ return Math.round(x/0.25)*0.25; }
function adviseExercise(exId, tdef){
  const ex=exById(exId);
  const hi=tdef?tdef.hi:12, lo=tdef?tdef.lo:8;
  const perf=lastExercisePerf(exId);
  const deload = S.week && S.week.deload;
  if(ex.bw){   // bodyweight: rep-progressie i.p.v. kg-advies
    if(!perf) return {text:`Mik op ${lo}–${hi} reps per set met nette techniek — vanaf nu bouwen we op.`, suggestKg:null, hold:true};
    if(deload) return {text:`Deload-week: houd het rustig, een paar reps minder dan normaal. Herstel staat voorop.`, suggestKg:null, hold:true};
    const atTop = perf.sets.length>0 && perf.sets.every(st=>num(st.reps)>=hi);
    return atTop
      ? {text:`Top — alle sets op ${hi}+ reps! Voeg reps toe of maak 'm strenger (langzamer tempo of pauze). 💪`, suggestKg:null, hold:true}
      : {text:`Pak per set zoveel mogelijk reps (richting ${hi}). Techniek boven aantal.`, suggestKg:null, hold:true};
  }
  if(!perf) return {text:`Kies een gewicht waarbij ${lo}–${hi} reps net lukken. Noteer 'm — vanaf nu bouwen we op.`, suggestKg:null};
  const working=maxOf(perf.sets, st=>st.kg);
  const allAtTop = perf.sets.length>0 && perf.sets.every(st=>num(st.reps)>=hi);
  const rpe = isNum(perf.rpe)?num(perf.rpe):null;
  if(deload){
    const light = working? roundQuarter(working*0.9):null;
    return {text:`Deload-week: houd het licht — ${light?("~"+fmt(light,2)+" kg"):"iets minder gewicht"} met ruime marge. Herstel staat voorop.`, suggestKg:light, hold:true};
  }
  if(allAtTop && (rpe===null || rpe<=8)){
    const step=ex.groot?2.5:1.25;
    const nk = working? roundQuarter(working+step):null;
    return ex.groot
      ? {text:`Top — alle sets vol! Probeer ${nk?fmt(nk,2)+" kg":"+2,5 kg"} (+${fmt(step,2)}). 💪`, suggestKg:nk}
      : {text:`Alles gehaald! Probeer ${nk?fmt(nk,2)+" kg":"+1,25 kg"} (+${fmt(step,2)}) of +2 reps.`, suggestKg:nk};
  }
  if(rpe!==null && rpe>=9) return {text:`Vorige keer pittig (RPE ${rpe}). Houd ${fmt(working,2)} kg aan, mik op dezelfde reps met betere techniek.`, suggestKg:working, hold:true};
  return {text:`Houd ${working?fmt(working,2)+" kg":"hetzelfde"} aan en pak het volledige repbereik (tot ${hi} reps).`, suggestKg:working, hold:true};
}

/* ---- slot-advies (hardlopen/gym/hiit) ---- */
function engineSlotAdvies(slot){
  if(slot.kind==="run"){
    const longest=longestRun();
    const deload = S.week && S.week.deload;
    if(slot.sub==="lang"){
      if(deload) return {km: Math.round((longest||4)*2)/2, type:"lang", note:"Deload-week: zelfde afstand, lekker rustig."};
      let next = longest>0 ? Math.min(longest+0.5, Math.round(longest*1.10*2)/2) : 5;
      next = Math.max(next, longest||0); next=Math.round(next*2)/2;
      return {km:next, type:"lang", note:`Iets langer dan je langste (${longest||4} km). Houd het tempo rustig.`};
    }
    if(slot.sub==="rustig") return {km:4, type:"rustig", note:"Zone 2, lekker babbeltempo. Run-walk mag altijd."};
    if(slot.sub==="interval") return {km:5, type:"interval", note:"Inlopen + 5× 1 min vlot met joggen ertussen + uitlopen."};
    if(slot.sub==="tempo") return {km:5, type:"tempo", note:"Inlopen + aangehouden steviger blok van ~10 min + uitlopen."};
  }
  if(slot.kind==="gym") return {note: getTemplates()[slotTemplateId(slot)].oef.length+" oefeningen · advies per set in de logger"};
  if(slot.kind==="hiit") return {note:"Vrij klasje — altijd anders. Log type, duur, RPE."};
  return {note:""};
}

/* ---- weekvoorstel genereren (met uitleg: wat & waarom) ---- */
function generateWeekProposal(monday){
  const base=defaultProposal(monday);
  const dl=shouldDeload(monday);
  base.deload=dl.deload;
  const uitleg=[];
  if(!S.sessions.length){
    uitleg.push({icon:"✨",text:"Je eerste week! De voorstellen zijn een startpunt — vul ze in zoals jij wil. Veel plezier 💖"});
  }
  dl.reasons.forEach(r=>uitleg.push(r));
  if(dl.deload) uitleg.push({icon:"🌿",text:"Daarom stelt je coach deze week een lichtere ronde voor: zelfde structuur, minder gewicht en rustiger lopen. Dit is geen stap terug — herstel is waar je sterker van wordt."});
  progressionWins().forEach(w=>uitleg.push(w));
  if(runHistory().length>0){
    if(runBaseUnlocked() && !dl.deload) uitleg.push({icon:"⚡",text:"Je hardloopbasis staat! Zin om eens een interval of tempo te proberen? Wissel een duurloop naar Interval — helemaal vrijblijvend."});
    else if(!runBaseUnlocked()) uitleg.push({icon:"🌱",text:`We bouwen je hardlopen rustig op: vooral makkelijke kilometers, de lange loop iets langer dan vorige keer (richting ~${Math.round((longestRun()+0.5)*2)/2||5} km).`});
  }
  const ph=cyclePhase(monday);
  if(ph && (ph.fase==="folliculair"||ph.fase==="ovulatie")) uitleg.push({icon:ph.icon,text:`Cyclus: ${ph.label} fase — ${ph.advies}`});
  const prevWeekCount=sessionsInWeek(addDays(monday,-7)).length;
  if(prevWeekCount===0 && S.sessions.length>0) uitleg.push({icon:"🤍",text:"Vorige week even rust gehad — helemaal oké. We pakken kalm de draad weer op, zonder schuld."});
  base.uitleg=uitleg;
  return base;
}

/* ---- PR-verzameling (voor PR-muur in fase 4) ---- */
function getPRs(){
  return {
    hipThrust: best1RMForExercise("hip_thrust"),
    heaviestHipThrust: heaviestSet("hip_thrust"),
    longestRun: longestRun(),
    fastestKmPace: fastestKmPace(),
    bestWeekLoad: bestWeekLoad()
  };
}
function bestWeekLoad(){
  const byWeek={}; S.sessions.forEach(s=>{ const m=mondayOf(s.datum); byWeek[m]=(byWeek[m]||0)+sessLoad(s); });
  const vals=Object.entries(byWeek); if(!vals.length) return {load:0, week:null};
  vals.sort((a,b)=>b[1]-a[1]); return {load:vals[0][1], week:vals[0][0]};
}

/* ============================================================
   BO'S BEESTENBOEL — SVG-DIER-GENERATOR  (fase 5)
   Eigen, schattige dieren. Groeien baby→volwassen, knipperen,
   reageren. cfg per soort; opts.stage / opts.pink / opts.happy.
   ============================================================ */
function lighten(hex,amt){
  amt=amt==null?0.35:amt; const n=parseInt(hex.slice(1),16);
  let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  r=Math.round(r+(255-r)*amt); g=Math.round(g+(255-g)*amt); b=Math.round(b+(255-b)*amt);
  return "#"+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}
function darken(hex,amt){ amt=amt==null?0.3:amt; const n=parseInt(hex.slice(1),16);
  let r=(n>>16)&255,g=(n>>8)&255,b=n&255; r=Math.round(r*(1-amt)); g=Math.round(g*(1-amt)); b=Math.round(b*(1-amt));
  return "#"+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1); }

/* Naturalistische zij-profiel dieren (zoo-tycoon stijl).
   plan: "quad" (standaard) | "bird" | "penguin". Dier kijkt naar rechts. */
function legSVG(x,topY,h,w,col){ return `<rect x="${(x-w/2).toFixed(1)}" y="${topY.toFixed(1)}" width="${w.toFixed(1)}" height="${h.toFixed(1)}" rx="${(w/2).toFixed(1)}" fill="${col}"/>`; }
function seasonGear(hCX,hCY,hR,eX,eY,season){
  if(season==="kerst") return `<path d="M${hCX-hR*0.7},${hCY-hR*0.55} q${hR*0.8},-14 ${hR*1.5},-1 z" fill="#d23b3b"/><rect x="${hCX-hR*0.8}" y="${hCY-hR*0.7}" width="${hR*1.6}" height="3.6" rx="1.8" fill="#fff"/><circle cx="${hCX+hR*0.85}" cy="${hCY-hR*0.55-13}" r="3" fill="#fff"/>`;
  if(season==="zomer") return `<rect x="${eX-3.8}" y="${eY-3}" width="7.4" height="5.6" rx="2" fill="#181018"/><rect x="${eX+3.4}" y="${eY-1.4}" width="3.4" height="1.5" fill="#181018"/>`;
  if(season==="feest") return `<path d="M${hCX},${hCY-hR-9} l-5,11 l10,0 z" fill="#ff4d97"/><circle cx="${hCX}" cy="${hCY-hR-9}" r="2.4" fill="#ffd16a"/>`;
  return "";
}
function eyeSVG(x,y,r,col,cls){ return `<g class="${cls||'eye-r'}"><ellipse cx="${x}" cy="${y}" rx="${r}" ry="${(r*1.15).toFixed(2)}" fill="${col}"/><circle cx="${(x-r*0.35).toFixed(2)}" cy="${(y-r*0.4).toFixed(2)}" r="${(r*0.34).toFixed(2)}" fill="#fff"/></g>`; }

  if(has("forelock")||has("crest")) h+=`<path d="M${(hCX-2).toFixed(1)},${(hCY-hR*0.8).toFixed(1)} q3,-10 8,-9 q-2,6 0,10 z" fill="${cfg.maneCol||cfg.crestCol||acc}"/>`;
  if(has("whiskers")) h+=`<g stroke="${darken(belly,.22)}" stroke-width="0.8" opacity=".7"><line x1="${hCX+hR}" y1="${(hCY+hR*0.3).toFixed(1)}" x2="${hCX+hR*1.95}" y2="${(hCY+hR*0.08).toFixed(1)}"/><line x1="${hCX+hR}" y1="${(hCY+hR*0.46).toFixed(1)}" x2="${hCX+hR*1.95}" y2="${(hCY+hR*0.55).toFixed(1)}"/></g>`;
  h+=seasonGear(hCX,hCY,hR,eX,eY,opts.season);
  return `<g class="bob">${s}${h}</g>`;
}

function birdInner(cfg,opts){

function turtleInner(cfg,opts){
  const shell=opts.pink?"#e088b3":cfg.body, plastron=cfg.belly||lighten(shell,.3), scute=cfg.accent||darken(shell,.3), skin=cfg.legCol||"#9bb36a", eyeC=cfg.eyeColor||"#1f1016";

  let s="";
  s+=`<ellipse cx="50" cy="${groundY+1}" rx="25" ry="4" fill="rgba(0,0,0,.15)"/>`;
  s+=`<path d="M${cx-13},${cy+4} q-9,2 -10,9 q7,1 12,-4 z" fill="${darken(skin,.08)}"/>`;                     // achterflipper
  s+=`<path d="M${cx-19},${cy+1} l-5,2 l4,2 z" fill="${skin}"/>`;                                            // staartje
  const hCX=cx+19, hCY=cy;
  s+=`<ellipse cx="${hCX}" cy="${hCY}" rx="8" ry="6.5" fill="${skin}"/>`;
  s+=`<ellipse cx="${hCX-3}" cy="${hCY-2}" rx="3" ry="2" fill="#fff" opacity=".15"/>`;
  s+=`<circle cx="${hCX+2}" cy="${hCY-1}" r="1.7" fill="#fff"/><circle cx="${(hCX+2.4).toFixed(1)}" cy="${(hCY-1).toFixed(1)}" r="1" fill="${eyeC}"/>`;
  s+=`<path d="M${hCX+5},${hCY+2.5} q2,1 4,0.5" stroke="${darken(skin,.3)}" stroke-width="1" fill="none" stroke-linecap="round"/>`;
  s+=`<path d="M${cx+4},${cy+5} q9,4 9,11 q-7,0 -12,-6 z" fill="${skin}"/>`;                                  // voorflipper
  s+=`<ellipse cx="${cx}" cy="${cy+6}" rx="19" ry="6" fill="${plastron}"/>`;                                 // plastron
  s+=`<path d="M${cx-19},${cy+5} a19,16 0 0 1 38,0 z" fill="${shell}"/>`;                                     // schild-dome
  s+=`<ellipse cx="${cx-7}" cy="${cy-6}" rx="7" ry="3.5" fill="#fff" opacity=".12"/>`;
  s+=`<path d="M${cx-19},${cy+4} a19,15 0 0 1 38,0" fill="none" stroke="${scute}" stroke-width="1.4" opacity=".5"/>`;
  s+=`<ellipse cx="${cx}" cy="${cy-1}" rx="9" ry="7" fill="none" stroke="${scute}" stroke-width="1.3" opacity=".45"/>`;
  s+=`<path d="M${cx},${cy-15} l0,7 M${cx-9},${cy-9} l-2,6 M${cx+9},${cy-9} l2,6 M${cx-15},${cy} l-3,4 M${cx+15},${cy} l3,4" stroke="${scute}" stroke-width="1.2" fill="none" opacity=".4"/>`;
  return `<g class="bob">${s}</g>`;
}
function creatureInnerByPlan(cfg,opts){
  const plan=cfg.plan||"quad";
  if(plan==="bird") return birdInner(cfg,opts);
  if(plan==="penguin") return penguinInner(cfg,opts);
  if(plan==="fish") return fishInner(cfg,opts);
  if(plan==="butterfly") return butterflyInner(cfg,opts);
  if(plan==="crab") return crabInner(cfg,opts);
  if(plan==="seal") return sealInner(cfg,opts);
  if(plan==="turtle") return turtleInner(cfg,opts);
  return quadInner(cfg,opts);
}
function creatureSVG(cfg, opts){
  opts=opts||{};
  return `<svg viewBox="0 0 100 100" width="100%" height="100%" style="overflow:visible;display:block"><g class="flip">${creatureInnerByPlan(cfg,opts)}</g></svg>`;
}

/* ============================================================
   SPEL — helpers
   ============================================================ */
function owns(soort){ return S.game.dieren.some(d=>d.soort===soort); }
function discovered(soort){ return S.game.album.includes(soort); }
function addAnimal(soort, opts){
  opts=opts||{};
  const sp=ANIMALS[soort]; if(!sp) return null;
  const inst={ id:uid("a_"), soort, naam: opts.naam||sp.naam, groei: opts.groei!=null?opts.groei:(owns(soort)?1:0.4),
    blijheid:100, voer:0, sport: opts.sport || SPORT_GROUPS[Math.floor(Math.random()*SPORT_GROUPS.length)], zone: opts.zone || (ANIMALS[soort].prefZone && (S.game.zones||[]).includes(ANIMALS[soort].prefZone) ? ANIMALS[soort].prefZone : (S.game.activeZone||"home")), x: opts.x!=null?opts.x:(15+Math.random()*70), y:0, skin:"normaal", verkregen:todayISO() };
  S.game.dieren.push(inst);
  if(!discovered(soort)){ S.game.album.push(soort); if(sp.rarity==="legendarisch") grantBadge("eerste_legendarisch"); }
  if(S.game.dieren.length>=5) grantBadge("vijf_dieren");
  return inst;
}
function animalStage(d){ return d.groei>=1?"volwassen": d.groei>=0.7?"jong":"baby"; }
function grantBadge(id){ if(!S.game.badges) S.game.badges=[]; if(!S.game.badges.includes(id)){ S.game.badges.push(id); const b=BADGES[id]; if(b) setTimeout(()=>toast("🏅","Badge ontgrendeld: "+b.naam+" "+b.icon,"party"),400); } }

/* perks: multiplier op Pootjes */
function pootjesMultiplier(s, ctx){
  ctx=ctx||{}; let m=1, perks=[];
  if(owns("stekkie")){ m+=0.05; }
  if(owns("otter") && s.type==="hardlopen"){ m+=0.10; perks.push("Otter +10%"); }
  if(owns("panter") && (s.type==="hiit" || (s.type==="hardlopen"&&["interval","tempo"].includes(s.looptype)))){ m+=0.12; perks.push("Panter +12%"); }
  if(owns("leeuw") && ctx.gymPR){ m+=0.15; perks.push("Leeuw +15%"); }
  if(owns("panda") && S.week && S.week.deload){ m+=0.15; perks.push("Panda +15%"); }
  const avgH=zooAvgHappy();
  if(avgH!=null && avgH>=HAPPY_ZOO_BONUS_MIN){ m+=HAPPY_ZOO_BONUS_PCT; perks.push(`Blije zoo +${Math.round(HAPPY_ZOO_BONUS_PCT*100)}%`); }
  return {m, perks};
}

/* faciliteiten per zone */
function zoneFacilities(zone){ return (S.game.faciliteiten||[]).filter(f=>(f.zone||"home")===zone); }
function ownsFacilityInZone(zone, soort){ return zoneFacilities(zone).some(f=>f.soort===soort); }
function zoneHappiness(zone){
  const animals=zoneAnimals(zone); if(!animals.length) return 0;
  let base=avgOf(animals, a=>a.blijheid) ?? 80;
  // blijheid-faciliteiten geven een kleine boost (gecapt op 100)
  const happyFac=zoneFacilities(zone).filter(f=>FACILITIES[f.soort]&&FACILITIES[f.soort].boost==="blijheid").length;
  return clamp(base + happyFac*6, 0, 100);
}
/* score per zone — telt dieren, blijheid, faciliteiten, decoraties */
function zoneScore(zone){
  const animals=zoneAnimals(zone), facs=zoneFacilities(zone), decos=zoneDecos(zone);
  if(!animals.length && !facs.length && !decos.length && zone==="home") return 8;
  let s = animals.length*9 + Math.round(zoneHappiness(zone)/12) + decos.length*3;
  facs.forEach(f=>{ const b=FACILITIES[f.soort]?FACILITIES[f.soort].boost:""; s += b==="score"?14: b==="bezoekers"?7: 5; });
  return s;
}
function zoneVisitors(zone){
  const facs=zoneFacilities(zone);
  let mult=1; facs.forEach(f=>{ if(FACILITIES[f.soort]&&FACILITIES[f.soort].boost==="bezoekers") mult += (f.soort==="kiosk"?0.6:0.3); });
  return Math.round((zoneScore(zone)*2.4 + zoneAnimals(zone).length*5) * mult);
}
/* zoo-niveau & bezoekers — afhankelijk van wat ze bouwt (niet van reeks) */
function computeZooLevel(){
  const g=S.game;
  if(!Array.isArray(g.zones)||!g.zones.length) g.zones=["home"];
  const zoneSum = g.zones.reduce((a,z)=>a+zoneScore(z),0);
  const score = zoneSum + g.album.length*6 + (g.zones.length-1)*22 + (g.totaalEierenUit||0)*4 + (g.faciliteiten||[]).length*6;
  g.zooNiveau = Math.max(1, Math.floor(score/42)+1);
  g.bezoekers = g.zones.reduce((a,z)=>a+zoneVisitors(z),0) + g.dieren.length*4;
  return g.zooNiveau;
}
function zooStars(){ const lvl=computeZooLevel(); return clamp(Math.round(lvl/2),1,5); }

/* ---- blijheid: groepsindeling, dagelijks verval, training-boost ---- */
function ensureAnimalSports(){
  (S.game.dieren||[]).forEach(d=>{ if(!d.sport) d.sport=SPORT_GROUPS[Math.floor(Math.random()*SPORT_GROUPS.length)]; });
}
function dailyDecayRate(h){ for(const t of HAPPY_DECAY_TIERS){ if(h>=t.min) return t.rate; } return 5; }
function applyHappinessDecay(){
  const g=S.game, today=todayISO();
  if(!g.blijVervalDatum){ g.blijVervalDatum=today; return; }   // eerste keer: alleen ijken
  let gap=daysBetween(g.blijVervalDatum, today);
  if(gap<=0) return;
  gap=Math.min(gap, 60);                                        // veiligheidscap bij lange afwezigheid
  (g.dieren||[]).forEach(d=>{
    let h=(d.blijheid==null?100:d.blijheid);
    for(let i=0;i<gap && h>0;i++){ h=Math.max(0, h - dailyDecayRate(h)); }   // per dag; tarief volgt het niveau (hoger = sneller)
    d.blijheid=h;
    d.groei=Math.min(1,(d.groei==null?1:d.groei)+GROW_PER_DAY*gap);          // groeit vanzelf op naar volwassen
  });
  g.blijVervalDatum=today;
}
function boostAnimalsForSession(s){
  const g=S.game; let n=0;
  if(s.type==="padel"){                                         // geen eigen groep → iedereen een beetje
    (g.dieren||[]).forEach(d=>{ d.blijheid=Math.min(100,(d.blijheid==null?100:d.blijheid)+SPORT_BOOST.padel); n++; });
    return {n, all:true};
  }
  const boost=SPORT_BOOST[s.type]; if(!boost) return {n:0, all:false};
  (g.dieren||[]).forEach(d=>{ if((d.sport||"")===s.type){ d.blijheid=Math.min(100,(d.blijheid==null?100:d.blijheid)+boost); n++; } });
  return {n, all:false};
}
function boostAllAnimals(amt){ (S.game.dieren||[]).forEach(d=>{ d.blijheid=Math.min(100,(d.blijheid==null?100:d.blijheid)+amt); }); }
function zooAvgHappy(){ return avgOf(S.game.dieren, a=>a.blijheid); }
function zooMood(){ const a=zooAvgHappy(); if(a==null) return {pct:null,emoji:"🐾",label:""}; const pct=Math.round(a);
  const m = pct>=80?{emoji:"😻",label:"dolblij"}: pct>=60?{emoji:"😊",label:"blij"}: pct>=40?{emoji:"😐",label:"oké"}:{emoji:"😢",label:"verdrietig"};
  return {pct, emoji:m.emoji, label:m.label}; }
function sadSportGroup(){
  const by={}; SPORT_GROUPS.forEach(sp=>by[sp]=[]);
  (S.game.dieren||[]).forEach(d=>{ if(by[d.sport]) by[d.sport].push(d.blijheid==null?100:d.blijheid); });

  SPORT_GROUPS.forEach(sp=>{ if(!by[sp].length) return; const av=by[sp].reduce((a,b)=>a+b,0)/by[sp].length; if(av<HAPPY_SAD_THRESHOLD && (!worst||av<worst.av)) worst={sport:sp, av}; });
  return worst;
}

function gameAfterSession(s, ctx){
  ctx=ctx||{}; const prs=ctx.prs||[], base=ctx.base!=null?ctx.base:sessPootjesBase(s);
  const g=S.game; let bonus=0, messages=[];
  const gymPR = prs.some(p=>p.kind==="kracht");
  // perk-multiplier
  const pm=pootjesMultiplier(s,{gymPR});
  const perkBonus=Math.round(base*(pm.m-1));
  if(perkBonus>0) messages.push({icon:"🐾",text:`Perk-bonus +${perkBonus}${pm.perks.length?" ("+pm.perks.join(", ")+")":" (Stekkie +5%)"}`}), bonus+=perkBonus;
  // lange sessie
  if(num(s.duur)>=60){ bonus+=25; messages.push({icon:"⏱️",text:"Lange sessie +25 Pootjes!"}); }
  // PR-bonus
  prs.forEach(pr=>{ bonus+=60; if(pr.kind==="kracht") grantBadge("eerste_pr"); });
  if(prs.length) messages.push({icon:"🏆",text:`PR-bonus +${prs.length*60}!`});
  // nieuwe afstand-grens
  if(s.type==="hardlopen" && s.km>0){
    const kmR=Math.floor(s.km), prevMax=Math.floor(maxOf(S.sessions.filter(x=>x.type==="hardlopen"&&x.id!==s.id),x=>x.km));
    if(kmR>prevMax && prevMax>0){ bonus+=40; messages.push({icon:"🏁",text:`Nieuwe afstand-grens (${kmR} km) +40!`}); }
  }
  // variatie: alle 3 sporttypes deze week (1× per week)
  const wkTypes=new Set(sessionsThisWeek().map(x=>x.type)), wkKey=thisMonday();
  if(wkTypes.has("gym")&&wkTypes.has("hardlopen")&&wkTypes.has("hiit") && g.variatieWeek!==wkKey){
    g.variatieWeek=wkKey; bonus+=80; grantBadge("variatie"); messages.push({icon:"🌈",text:"Variatie! Alle 3 sporttypes deze week +80 🌈"});
  }
  // streak-record + 7-mijlpaal
  if(g.streakDagen>(g.streakRecord||0)) g.streakRecord=g.streakDagen;
  if(g.streakDagen===7 && g.streak7Awarded!==g.streakLaatste){ g.streak7Awarded=g.streakLaatste; bonus+=50; grantBadge("streak_7"); messages.push({icon:"🔥",text:"7 dagen op rij! +50 🔥"}); }
  // ei elke 5 sessies
  g.sessiesSindsEi=(g.sessiesSindsEi||0)+1;
  if(g.sessiesSindsEi>=SESSIONS_PER_EGG){ g.sessiesSindsEi=0; g.eieren=(g.eieren||0)+1; messages.push({icon:"🥚",text:`Mystery-ei verdiend! Loop 'm uit (${fmt(HATCH_STEPS)} stappen) 🚶‍♀️🐣`}); }
  // sportmaatjes worden blijer van een matchende training (blijheid zakt anders 25/dag)
  const boostRes = boostAnimalsForSession(s);
  if(boostRes.n>0){
    messages.push({ icon: TYPE_ICON[s.type]||"🐾", text: boostRes.all
      ? `Alle dieren werden wat blijer van je ${TYPE_LABEL[s.type]||"sessie"}! 🐾`
      : `${boostRes.n} ${plural(boostRes.n,"sportmaatje","sportmaatjes")} (${TYPE_LABEL[s.type]}) ${boostRes.n===1?"werd":"werden"} blijer! 🐾` });
  }
  // quests
  questProgressForSession(s, {prs});
  return {bonus, messages};
}

/* ---- stappen → eieren (web: handmatig + Apple Shortcut-URL-brug) ---- */
const HATCH_STEPS = 20000;                                // stappen om 1 ei uit te broeden (eieren verdien je met trainingen)
const STEP_POOTJES_BLOCK = 2000, STEP_POOTJES_AMT = 15;   // 15 Pootjes per 2000 stappen
const SESSIONS_PER_EGG = 2;                               // 2 trainingen = 1 ei
function ensureStepsState(){ if(!S.steps) S.steps={}; }
function stepsToday(){ ensureStepsState(); return (S.steps[todayISO()]||{}).steps||0; }
function stepTarget(){ const v=S.profile.stappenDoel; return (v && v>0)? v : 10000; }
function stepDayHit(d){ const st=S.steps[d]; if(!st) return false; const tgt=stepTarget(); return !!(tgt && num(st.steps)>=tgt); }
function stepWeekly(){ const by={}; Object.keys(S.steps||{}).forEach(d=>{ const m=mondayOf(d); by[m]=by[m]||0; if(stepDayHit(d)) by[m]++; }); return by; }
function recordSteps(steps, dateISO, opts){
  opts=opts||{};
  ensureStepsState();
  const d=dateISO||todayISO(); steps=Math.max(0,Math.round(num(steps)));
  const cur=S.steps[d]||{steps:0, pootjesAwarded:0, hatchCounted:0};
  cur.steps = opts.exact ? steps : Math.max(cur.steps||0, steps);   // handmatig = exact (mag omlaag); sync = max
  // Pootjes: 15 per 2000 stappen — zakt mee bij een omlaag-correctie (delta mag negatief; addPootjes clampt op 0)
  const totalStepPootjes=Math.floor(cur.steps/STEP_POOTJES_BLOCK)*STEP_POOTJES_AMT;
  const deltaPootjes=totalStepPootjes-(cur.pootjesAwarded||0);
  cur.pootjesAwarded=totalStepPootjes;
  if(deltaPootjes) addPootjes(deltaPootjes, "stappen");
  const newPootjes=Math.max(0, deltaPootjes);   // alleen positief tonen in de toast
  // uitbroeden: stappen-verschil = broed-voortgang (signed → omlaag-correctie telt ook terug, geclamped op 0)
  const delta=cur.steps-(cur.hatchCounted||0);
  cur.hatchCounted=cur.steps;
  S.game.broedStappen=Math.max(0,(S.game.broedStappen||0)+delta);
  // dagdoel stappen 100% → alle dieren +5 (1×/dag)
  const stTgt=stepTarget();
  if(stTgt && cur.steps>=stTgt && !cur.goalBoosted){ cur.goalBoosted=true; boostAllAnimals(HAPPY_HABIT_BOOST); }
  S.steps[d]=cur;
  const hatched=processHatching();
  save(); refreshChrome();
  return {newPootjes, total:cur.steps, hatched};
}
function processHatching(){
  const g=S.game; const out=[];
  while((g.broedStappen||0)>=HATCH_STEPS && (g.eieren||0)>0){
    g.broedStappen-=HATCH_STEPS;
    const res=hatchOneEgg();   // eieren--, dier erbij
    if(res) out.push(res); else break;
  }
  if((g.broedStappen||0)>HATCH_STEPS) g.broedStappen=HATCH_STEPS;   // niet oneindig bufferen zonder eieren
  return out;
}
function handleStepUrl(url){

    const today=todayISO(); let date=params.get("date")||today;

}

/* ---- eieren met pity ---- */
function eggPool(){ return ANIMAL_IDS.filter(id=>ANIMALS[id].viaEi); }
function pickByRarity(pool, rarity){
  const c=pool.filter(id=>ANIMALS[id].rarity===rarity);
  if(!c.length) return pool[(Math.random()*pool.length)|0];
  const fresh=c.filter(id=>!discovered(id)); const arr=fresh.length?fresh:c;
  return arr[(Math.random()*arr.length)|0];
}
function hatchOneEgg(){
  const g=S.game; if((g.eieren||0)<=0) return null;
  g.eieren--; g.totaalEierenUit=(g.totaalEierenUit||0)+1; g.pityTeller=(g.pityTeller||0)+1;
  grantBadge("eerste_ei");
  const pool=eggPool(); let soort;
  const guaranteed=g.pityTeller>=8, roll=Math.random();
  if(guaranteed||roll<0.06) soort=pickByRarity(pool,"legendarisch");
  else if(roll<0.32) soort=pickByRarity(pool,"zeldzaam");
  else soort=pickByRarity(pool,"gewoon");
  const wasNew=!discovered(soort);
  if(ANIMALS[soort].rarity==="legendarisch") g.pityTeller=0;
  let dupBonus=0;
  if(owns(soort)){ dupBonus=ANIMALS[soort].rarity==="legendarisch"?400:ANIMALS[soort].rarity==="zeldzaam"?120:50; addPootjes(dupBonus); }
  const inst=addAnimal(soort,{groei:0.4});
  computeZooLevel(); save();
  return {soort, inst, wasNew, dupBonus, rarity:ANIMALS[soort].rarity};
}

  monday=monday||thisMonday();

  const byType={gym:0,hardlopen:0,hiit:0}; sess.forEach(s=>byType[s.type]=(byType[s.type]||0)+1);

const COACH_SYS = "Je bent BBB, de persoonlijke fitnesscoach van Bo: warm, positief, nuchter en motiverend. Schrijf in het Nederlands, af en toe een 🍑 of 💪.";
async function runAICoach(sys, userContent, resultTitle){
  const p=S.profile;
  const direct = !p.aiEndpoint && !!p.aiKey; // native app: sleutel staat op toestel → rechtstreeks naar Anthropic
  if(!p.aiEndpoint && !p.aiKey){ copyForClaude(); return; }
  openModal(`<button class="x" aria-label="Sluiten" onclick="closeModal()">✕</button><h2>🤖 Je coach denkt na…</h2>
    <div style="text-align:center;padding:24px"><div style="font-size:40px;animation:bob 1s infinite">🐾</div><div class="cardsub" style="margin-top:10px">Even geduld…</div></div>`);
  try{
    const model = p.aiModel||"claude-haiku-4-5";
    const body = { model, max_tokens: 700, system: sys, messages:[{role:"user", content: userContent}] };
    let url, headers;
    if(direct){
      url = "https://api.anthropic.com/v1/messages";
      headers = {"content-type":"application/json","x-api-key":p.aiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"};
    } else {
      url = p.aiEndpoint; headers = {"Content-Type":"application/json"};
      if(p.aiKey){ headers["x-api-key"]=p.aiKey; headers["anthropic-version"]="2023-06-01"; }
    }
    const res = await fetch(url, {method:"POST", headers, body: JSON.stringify(body)});
    if(!res.ok){ let d=""; try{ const ej=await res.json(); if(ej&&ej.error&&ej.error.message) d=" — "+ej.error.message; }catch(_){} throw new Error("HTTP "+res.status+d); }
    const data = await res.json();
    const text = (data.content&&data.content[0]&&data.content[0].text) || data.completion || data.text || data.message || (typeof data==="string"?data:"");
    if(!text || !text.trim()){ closeModal(); toast("🤔","De coach gaf een leeg antwoord — probeer het zo nog eens."); return; }
    openModal(`<button class="x" aria-label="Sluiten" onclick="closeModal()">✕</button><h2>🤖 ${resultTitle}</h2>
      <div style="white-space:pre-wrap;font-size:14px;line-height:1.6;background:var(--bg-soft);border:1px solid var(--line);border-radius:13px;padding:14px;max-height:50vh;overflow:auto">${esc(text)}</div>
      <div class="factions" style="margin-top:12px"><button class="btn ghost" onclick="closeModal()">Sluiten</button></div>`, true);
  }catch(e){
    const hint = direct ? "Controleer je Claude API-sleutel bij Logboek → instellingen (begint met sk-ant-…) en of je tegoed hebt." : "Controleer de proxy-endpoint-URL in instellingen.";
    openModal(`<button class="x" aria-label="Sluiten" onclick="closeModal()">✕</button><h2>🤖 Coach niet bereikbaar</h2>
      <div class="msub">Er ging iets mis (${esc(e.message)}). ${hint} Je kunt altijd de samenvatting kopiëren en in een Claude-chat plakken.</div>
      <div class="factions"><button class="btn" onclick="closeModal();copyForClaude()">📋 Kopieer voor Claude</button><button class="btn ghost" onclick="closeModal()">Sluiten</button></div>`);
  }
}

   VOORTGANG — data-helpers
   ============================================================ */
function currentWeight(){ return S.weights.length? S.weights[S.weights.length-1].kg : (S.profile.startGewicht||null); }
function weeklyWeightAvg(){
  const by={}; S.weights.forEach(w=>{ const m=mondayOf(w.datum); (by[m]=by[m]||[]).push(w.kg); });
  return Object.keys(by).sort().map(m=>({week:m, kg: by[m].reduce((a,b)=>a+b,0)/by[m].length}));
}
function smoothedCurrentWeight(){ const wa=weeklyWeightAvg(); return wa.length? wa[wa.length-1].kg : currentWeight(); }
function weightProgressPct(){
  const start=S.profile.startGewicht, goal=S.profile.streefGewicht, cur=smoothedCurrentWeight();
  if(start==null||goal==null||cur==null||start===goal) return null;
  return clamp((cur-start)/(goal-start)*100,0,100);
}
function weightProjection(){
  const wa=weeklyWeightAvg(); const goal=S.profile.streefGewicht;
  if(wa.length<3 || goal==null) return null;
  const recent=wa.slice(-4);
  const weeks=Math.max(1, daysBetween(recent[0].week, recent[recent.length-1].week)/7);
  const rate=(recent[recent.length-1].kg - recent[0].kg)/weeks;
  const cur=wa[wa.length-1].kg, remaining=goal-cur;
  if(Math.abs(rate)<0.05) return "Je gewicht is rustig stabiel — prima. Focus op kracht en lekker voelen. 💪";
  if(Math.sign(rate)===Math.sign(remaining) && Math.abs(remaining)>0.3){
    const wkLeft=Math.round(Math.abs(remaining/rate));
    const healthy=Math.abs(rate)<=0.8;
    return `In dit tempo (~${fmt(Math.abs(rate),1)} kg/week) zit je rond je streefgewicht over ~${wkLeft} ${plural(wkLeft,"week","weken")}. ${healthy?"Mooi gezond tempo 🌿":"Dit gaat hard — een rustiger tempo (0,3–0,7 kg/week) is duurzamer 💛"}`;
  }
  return "Je trend wijst nu even van je doel af — geen stress, gewicht schommelt. Blijf bij je gewoontes 💖";
}
function nonScaleWins(){
  const w=[];
  const ht=oneRMSeries("hip_thrust");
  if(ht.length>=2){ const g=ht[ht.length-1].est-ht[0].est; if(g>1) w.push(`Je geschatte hip thrust-1RM is ~${fmt(g,0)} kg gestegen sinds je begon 🍑`); }
  const lr=longestRun(); if(lr>0) w.push(`Je langste loop staat op ${fmt(lr,1)} km 🏃‍♀️`);
  const tot=S.sessions.length; if(tot>=5) w.push(`Je hebt al ${tot} sessies gelogd — consistentie is goud ✨`);
  return w;
}
function paceFmt(sec){ if(!sec) return "—"; const m=Math.floor(sec/60), s=Math.round(sec%60); return m+":"+pad2(s); }
function lastNWeeks(n){ const out=[]; const m=thisMonday(); for(let i=n-1;i>=0;i--) out.push(addDays(m,-7*i)); return out; }
function runKmByWeek(){ const by={}; runHistory().forEach(s=>{ const m=mondayOf(s.datum); by[m]=(by[m]||0)+num(s.km); }); return by; }
function paceSeries(){ return runHistory().filter(s=>s.km>=1&&s.tijd).map(s=>({datum:s.datum, pace:(s.tijd*60)/s.km})); }
function proteinTargetForDay(){ return proteinTarget(); }
function proteinDayHit(d){ const pr=S.protein[d]; if(!pr) return false; const tgt=proteinTarget(); return !!(pr.gehaald || (tgt && proteinDayTotal(d)>=tgt)); }
function proteinWeekly(){ const by={}; Object.keys(S.protein).forEach(d=>{ const m=mondayOf(d); by[m]=by[m]||0; if(proteinDayHit(d)) by[m]++; }); return by; }

/* rustige auto-scroll die naadloos opnieuw begint; pauzeert bij aanraken/hover */
var prAutoRAF=null, prAutoPaused=false, prAutoResumeT=null;
function startPrAuto(){
  if(prAutoRAF){ cancelAnimationFrame(prAutoRAF); prAutoRAF=null; }
  prAutoPaused=false;
  if(window.matchMedia && matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  const sc=document.getElementById("prScroll"); if(!sc) return;
  let pos=sc.scrollLeft;
  const pause=()=>{ prAutoPaused=true; if(prAutoResumeT) clearTimeout(prAutoResumeT); };
  const resumeSoon=()=>{ if(prAutoResumeT) clearTimeout(prAutoResumeT); prAutoResumeT=setTimeout(()=>{ pos=sc.scrollLeft; prAutoPaused=false; }, 2500); };
  sc.addEventListener("pointerdown", pause);
  sc.addEventListener("touchstart", pause, {passive:true});
  sc.addEventListener("wheel", ()=>{ pause(); resumeSoon(); }, {passive:true});
  ["pointerup","pointercancel","touchend"].forEach(ev=>sc.addEventListener(ev, resumeSoon, {passive:true}));
  sc.addEventListener("mouseenter", pause);
  sc.addEventListener("mouseleave", resumeSoon);
  const speed=0.5;
  function step(){
    const el=document.getElementById("prScroll");
    if(el!==sc || sc.offsetParent===null){ prAutoRAF=null; return; } // tab opnieuw gerenderd of onzichtbaar → loop parkeren (renderVandaag herstart 'm)
    const tiles=sc.children;
    if(!prAutoPaused && tiles.length>2){
      const period=tiles[Math.floor(tiles.length/2)].offsetLeft - tiles[0].offsetLeft;
      if(period>0){ pos+=speed; if(pos>=period) pos-=period; sc.scrollLeft=pos; }
    }
    prAutoRAF=requestAnimationFrame(step);
  }
  prAutoRAF=requestAnimationFrame(step);
}

/* ---- loopanimatie ---- */
let zooAnimRAF=null, zooNodes=[], zooLast=0;
function startZooAnim(){
  stopZooAnim();
  const stage=el("zooStage"); if(!stage) return;
  zooNodes=[...stage.querySelectorAll('.critter')].map(node=>{
    const id=node.dataset.id, d=S.game.dieren.find(x=>x.id===id);
    return { node, id, x:parseFloat(node.dataset.x)||50, vx:(Math.random()<.5?-1:1)*(2.2+Math.random()*2.6), pause:Math.random()*2000, ground:(d&&(d.y||0)<=12) };
  });
  zooLast=performance.now(); zooAnimRAF=requestAnimationFrame(tickZoo);
}
function stopZooAnim(){ if(zooAnimRAF){ cancelAnimationFrame(zooAnimRAF); zooAnimRAF=null; } zooNodes=[]; }
function tickZoo(t){
  const dt=Math.min(64,t-zooLast); zooLast=t;
  const ns=nightState();
  zooNodes.forEach(o=>{
    if(!o.ground || ns.night){ return; }   // nacht/geplaatst = stilstaan
    if(o.pause>0){ o.pause-=dt; return; }
    o.x += o.vx*dt/1000*6;
    if(o.x<3){ o.x=3; o.vx=Math.abs(o.vx); }
    if(o.x>92){ o.x=92; o.vx=-Math.abs(o.vx); }
    if(Math.random()<0.004) o.pause=800+Math.random()*2200;
    o.node.style.left=o.x+"%";
    o.node.classList.toggle('faceL', o.vx<0);
  });
  zooAnimRAF=requestAnimationFrame(tickZoo);
}
let tapSuppressed=false;
function tapCritter(id){
  if(tapSuppressed) return;                 // net gesleept → geen inspector
  const d=S.game.dieren.find(x=>x.id===id); if(!d) return;
  const node=[...document.querySelectorAll('.critter')].find(n=>n.dataset.id===id);
  if(node){ node.classList.add('jumping'); setTimeout(()=>node.classList.remove('jumping'),500); }
  d.blijheid=Math.min(100,(d.blijheid==null?100:d.blijheid)+1); save();
  openAnimalDetail(id);
}

/* ---- drag & drop (inrichten) ---- */
function attachZooDrag(){
  const stage=el("zooStage"); if(!stage) return;
  let drag=null;
  stage.querySelectorAll('[data-drag]').forEach(node=>{
    node.addEventListener('pointerdown', e=>{
      if(node.dataset.kind==="animal" && !ZOO_EDIT) return; // alleen tikken buiten edit
      e.preventDefault();
      const rect=stage.getBoundingClientRect();
      drag={node, kind:node.dataset.kind, id:node.dataset.id, rect, moved:false};
      node.setPointerCapture(e.pointerId);
    });
    node.addEventListener('pointermove', e=>{
      if(!drag||drag.node!==node) return;
      drag.moved=true;
      const x=clamp((e.clientX-drag.rect.left)/drag.rect.width*100, 2, 94);
      const y=clamp(drag.rect.bottom-e.clientY, 4, drag.rect.height-30);
      node.style.left=x+"%"; node.style.bottom=y+"px";
      drag._x=x; drag._y=y;
    });
    node.addEventListener('pointerup', e=>{
      if(!drag||drag.node!==node) return;
      if(drag.moved && drag._x!=null){
        if(drag.kind==="animal"){ const d=S.game.dieren.find(x=>x.id===drag.id); if(d){ d.x=Math.round(drag._x); d.y=Math.round(drag._y); } }
        else { const d=S.game.decoraties.find(x=>x.id===drag.id); if(d){ d.x=Math.round(drag._x); d.y=Math.round(drag._y); } }
        save(); tapSuppressed=true; setTimeout(()=>tapSuppressed=false,60);
      }
      drag=null;
    });
  });
}

/* ---- snapshot ---- */
function buildZooSceneSVG(W,H){
  const g=S.game, zone=ZONES[g.activeZone], ns=nightState();
  const gh=H*0.34;
  let inner=`<defs><linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${zone.sky[0]}"/><stop offset="1" stop-color="${zone.sky[1]}"/></linearGradient>
    <linearGradient id="grd" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${zone.ground}"/><stop offset="1" stop-color="${darken(zone.ground,.18)}"/></linearGradient></defs>`;
  inner+=`<rect width="${W}" height="${H}" fill="url(#sky)"/>`;
  if(ns.night) inner+=`<rect width="${W}" height="${H}" fill="rgba(20,15,55,.5)"/>`;
  inner+=`<rect x="0" y="${H-gh}" width="${W}" height="${gh}" fill="url(#grd)"/>`;
  (zone.deco||[]).forEach((e,i)=> inner+=`<text x="${30+i*70}" y="${H-12}" font-size="34">${e}</text>`);
  zoneDecos(g.activeZone).forEach(d=> inner+=`<text x="${d.x/100*W}" y="${H-d.y}" font-size="30">${DECOS[d.soort]?DECOS[d.soort].emoji:"⭐"}</text>`);
  zoneAnimals(g.activeZone).forEach(d=>{ const stg=animalStage(d), size= stg==="baby"?70:stg==="jong"?84:96;
    const plan=(ANIMALS[d.soort].cfg||{}).plan||"quad", fly=plan==="butterfly", swim=plan==="fish";
    const x=d.x/100*W - size/2;
    const y= fly ? (H*0.14 - (d.y||0)) : swim ? (H*0.40 - (d.y||0)) : (H-gh*0.5-(d.y||0)-size);
    inner+=`<svg x="${x.toFixed(0)}" y="${y.toFixed(0)}" width="${size}" height="${size}" viewBox="0 0 100 100">${creatureInner(ANIMALS[d.soort].cfg,{stage:stg,pink:d.skin==='roze',happy:d.blijheid>=70})}</svg>`; });
  inner+=`<text x="${W-16}" y="${28}" text-anchor="end" font-size="16" font-weight="700" fill="${ns.night?'#fff':'#3a1d30'}" font-family="sans-serif">${esc(S.profile.zooNaam||"Bo's Beestenboel")} · niveau ${g.zooNiveau}</text>`;
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">${inner}</svg>`;
}
function creatureInner(cfg,opts){ return creatureSVG(cfg,opts).replace(/^<svg[^>]*>/,"").replace(/<\/svg>$/,""); }
function snapshotZoo(){
  const W=760,H=470; const svg=buildZooSceneSVG(W,H);
  const blob=new Blob([svg],{type:"image/svg+xml;charset=utf-8"}), url=URL.createObjectURL(blob), img=new Image();
  img.onload=()=>{ const c=document.createElement("canvas"); c.width=W; c.height=H; const cx=c.getContext("2d");
    cx.drawImage(img,0,0,W,H); URL.revokeObjectURL(url);
    try{ c.toBlob(b=>{ const a=document.createElement("a"); a.href=URL.createObjectURL(b); a.download="bo_zoo_"+todayISO()+".png"; a.click(); toast("📸","Zoo-foto opgeslagen — deel maar trots! 💖","good"); }); }
    catch(e){ const a=document.createElement("a"); a.href=url; a.download="bo_zoo.svg"; a.click(); }
  };
  img.onerror=()=>{ const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([svg],{type:"image/svg+xml"})); a.download="bo_zoo.svg"; a.click(); toast("📸","Zoo opgeslagen als afbeelding."); };
  img.src=url;
}

      <div style="display:flex;align-items:center;gap:12px">
        <div class="toggle ${p.geluid?"on":""}" id="set_geluidToggle" onclick="toggleGeluid()"></div>
        <span style="font-size:13.5px;color:var(--dim)">Feest-geluid bij successen ${p.geluid?"aan":"uit"}</span>
      </div>
      <div style="display:flex;align-items:center;gap:12px;margin-top:12px">
        <div class="toggle ${p.notifs?"on":""}" id="set_notifsToggle" onclick="this.classList.toggle('on');toggleNotifs(this.classList.contains('on'))"></div>
        <span style="font-size:13.5px;color:var(--dim)">Dagelijkse beweeg-herinnering 🔔 (alleen in de geïnstalleerde app)</span>
      </div>
    </div>

    <div class="card" style="margin-bottom:14px">
      <h3><span class="ic">🤖</span>AI-coach in de app (optioneel)</h3>
      <div class="cardsub">Plak je Claude API-sleutel om een coach <b>ín de app</b> te krijgen — vraag direct om een persoonlijke notitie. Zonder sleutel gebruik je gewoon de gratis "kopieer voor Claude"-knop.</div>
      <div class="frow c2">
        <div class="field"><label>Claude API-sleutel</label><input id="set_aiKey" type="password" value="${esc(p.aiKey||"")}" placeholder="sk-ant-..."></div>
        <div class="field"><label>Model</label>
          <select id="set_aiModel">
            <option value="claude-haiku-4-5"${(!p.aiModel||p.aiModel==="claude-haiku-4-5")?" selected":""}>Claude Haiku 4.5 (snel & goedkoop)</option>
            <option value="claude-sonnet-4-6"${p.aiModel==="claude-sonnet-4-6"?" selected":""}>Claude Sonnet 4.6 (slimmer)</option>
            <option value="claude-opus-4-8"${p.aiModel==="claude-opus-4-8"?" selected":""}>Claude Opus 4.8 (max kwaliteit)</option>
          </select></div>
      </div>
      <div class="cardsub" style="margin-top:6px">Een sleutel maak je op <b>console.anthropic.com</b> (Account → API keys) en je laadt daar een klein tegoed op. Een coaching-notitie kost met Haiku een fractie van een cent. In de native app blijft de sleutel veilig op het toestel.</div>
      <details style="margin-top:8px"><summary class="cardsub" style="cursor:pointer">Geavanceerd: eigen proxy-endpoint</summary>
        <div class="field" style="margin-top:8px"><label>Proxy-endpoint URL (i.p.v. directe sleutel)</label><input id="set_aiEndpoint" value="${esc(p.aiEndpoint||"")}" placeholder="https://jouw-proxy.workers.dev"></div>
        <div class="cardsub">Voor de openbare web-versie: gebruik een eigen proxy (Cloudflare/Vercel) die de sleutel server-side houdt, want op een publieke URL is een front-end-sleutel zichtbaar.</div>
      </details>
      <div class="factions" style="margin-top:12px"><button class="btn sm" onclick="saveAI()">Opslaan</button></div>
    </div>

    <div id="logTableWrap"></div>`;

  el("importFile").addEventListener("change", importData);
  renderEiwitHint();
  renderLogTable();
}
function renderEiwitHint(){
  const p=S.profile, h=el("eiwitHint"); if(!h) return;
  const w = (S.weights.length? S.weights[S.weights.length-1].kg : p.startGewicht);
  if(w){ const lo=Math.round(w*1.6), hi=Math.round(w*2.0);
    h.textContent=`Richtlijn voor spiergroei: ~${lo}–${hi} g/dag (1,6–2,0 g/kg). Laat leeg voor automatisch (~${Math.round(w*1.8)} g).`; }
  else h.textContent="Vul je gewicht in voor een eiwit-richtlijn.";
}
function renderLogTable(){
  const wrap=el("logTableWrap"); if(!wrap) return;
  const all=[...S.sessions].sort((a,b)=> b.datum.localeCompare(a.datum) || (b.created||0)-(a.created||0));
  if(!all.length){ wrap.innerHTML=`<div class="empty">Nog geen sessies gelogd. Vink trainingen af in de Week-tab.</div>`; return; }
  const rows=all.map(e=>{
    const g=TYPE_GRAD[e.type]||["#ff85b8","#ff4d97"];
    const det = e.type==="gym" ? (e.oefeningen?e.oefeningen.length+" oef.":"") :
                e.type==="hardlopen" ? [e.km?fmt(e.km,1)+" km":"", e.tempo?e.tempo:""].filter(Boolean).join(" · ") :
                e.type==="hiit" ? (e.omschrijving||"") :
                (e.duur?e.duur+" min":"");
    return `<tr>
      <td style="color:var(--dim)">${fmtDayShort(e.datum)}</td>
      <td><span style="display:inline-flex;align-items:center;gap:8px"><span style="width:26px;height:26px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;font-size:13px;background:linear-gradient(135deg,${g[0]},${g[1]})">${TYPE_ICON[e.type]||"•"}</span>${TYPE_LABEL[e.type]||e.type}</span></td>
      <td style="color:var(--dim);white-space:normal;max-width:220px">${esc(det||"—")}</td>
      <td class="num">${e.duur?e.duur+"′":"—"}</td>
      <td class="num">${e.rpe||"—"}</td>
      <td class="num">${sessLoad(e)||"—"}</td>
      <td><button class="btn sm danger" onclick="delSession('${e.id}')">✕</button></td>
    </tr>`;
  }).join("");
  wrap.innerHTML=`<div class="tablewrap"><table>
    <thead><tr><th>Datum</th><th>Type</th><th>Details</th><th class="num">Duur</th><th class="num">RPE</th><th class="num">Belasting</th><th></th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}
function delSession(id){
  const s=S.sessions.find(x=>x.id===id); if(!s) return;
  if(!confirm("Deze sessie verwijderen uit je logboek?")) return;
  S.sessions = S.sessions.filter(x=>x.id!==id);
  save(); renderLogboek(); toast("🗑️","Sessie verwijderd.");
}

/* ---- Instellingen opslaan ---- */
function saveProfiel(){
  const p=S.profile;
  p.naam=el("set_naam").value.trim()||"Bo";
  p.zooNaam=el("set_zoo").value.trim()||"Bo's Beestenboel";
  p.startGewicht=isNum(el("set_start").value)?num(el("set_start").value):null;
  p.streefGewicht=isNum(el("set_streef").value)?num(el("set_streef").value):null;
  p.lengte=isNum(el("set_lengte").value)?num(el("set_lengte").value):null;
  p.eiwitDoel=isNum(el("set_eiwit").value)?num(el("set_eiwit").value):null;
  p.stappenDoel=isNum(el("set_stappen").value)?num(el("set_stappen").value):10000;
  // eerste weging vastleggen als gewichtslog nog leeg is
  if(p.startGewicht && !S.weights.length) S.weights.push({datum:todayISO(), kg:p.startGewicht});
  save(); refreshChrome(); renderEiwitHint(); toast("✅","Profiel opgeslagen.","good");
}
function toggleCyclus(){
  S.profile.cyclusAan=!S.profile.cyclusAan; save(); renderLogboek();
}
function saveCyclus(){
  S.profile.cyclusStart=el("set_cyclusStart").value||null;
  S.profile.cyclusDuur=num(el("set_cyclusDuur").value)||28;
  if(S.profile.cyclusStart && !S.cycle.includes(S.profile.cyclusStart)) S.cycle.push(S.profile.cyclusStart);
  save(); toast("🌸","Cyclus-instellingen opgeslagen.","good");
}
function toggleGeluid(){ S.profile.geluid=!S.profile.geluid; save(); el("set_geluidToggle").classList.toggle("on"); if(S.profile.geluid) chime(); }
function setAccent(c){ S.profile.accent=c; applyAccent(); save(); renderLogboek(); }
function applyAccent(){
  const a=S.profile.accent||"#ff4d97", r=document.documentElement.style;
  r.setProperty("--accent",a); r.setProperty("--pink",a);
  try{ r.setProperty("--g-pink",`linear-gradient(135deg, ${lighten(a,.16)} 0%, ${darken(a,.2)} 100%)`);
       r.setProperty("--rose", lighten(a,.28)); r.setProperty("--magenta", darken(a,.18)); }catch(e){}
  const tm=document.querySelector('meta[name=theme-color]'); if(tm) tm.setAttribute("content","#160a12");
}
function saveAI(){
  const p=S.profile;
  p.aiEndpoint=el("set_aiEndpoint").value.trim();
  p.aiModel=el("set_aiModel").value;
  p.aiKey=el("set_aiKey").value.trim();
  save(); toast("🤖","AI-instellingen opgeslagen.","good");
}

/* ---- Export / import / wis ---- */
function exportSnapshot(){
  // privacy: API-sleutel + endpoint NIET meenemen in een gedeelde back-up
  const clone = JSON.parse(JSON.stringify(S));
  if(clone.profile){ delete clone.profile.aiKey; delete clone.profile.aiEndpoint; }
  return JSON.stringify(clone, null, 2);
}
async function exportData(){
  const json = exportSnapshot(), fname = "bbb_backup_"+todayISO()+".json";
  const Cap = window.Capacitor;
  if(Cap && Cap.isNativePlatform && Cap.isNativePlatform()){
    // native app: download via <a> werkt niet in de WKWebView → schrijf + deel via Capacitor
    try{
      const FS = Cap.Plugins.Filesystem, Sh = Cap.Plugins.Share;
      if(!FS || !Sh) throw new Error("opslag-plugin ontbreekt");
      const res = await FS.writeFile({ path: fname, data: json, directory: "CACHE", encoding: "utf8" });
      await Sh.share({ title:"BBB back-up", text:"Bewaar deze BBB back-up goed.", url: res.uri, dialogTitle:"BBB back-up opslaan" });
      toast("⬇️","Back-up klaar — bewaar 'm goed!","good"); return true;
    }catch(e){ toast("⚠️","Back-up mislukt ("+((e&&e.message)||e)+"). Probeer 't opnieuw.","warn"); return false; }
  }
  // web: gewone download
  try{
    const blob=new Blob([json],{type:"application/json"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=fname; a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),1000);
    toast("⬇️","Back-up gedownload. Bewaar 'm goed!","good"); return true;
  }catch(e){ toast("⚠️","Back-up mislukt.","warn"); return false; }
}
function importData(ev){
  const f=ev.target.files[0]; if(!f) return; const r=new FileReader();
  r.onload=()=>{ try{
      const d=JSON.parse(r.result);
      if(!d || typeof d!=="object" || Array.isArray(d) || !(d.profile && (d.game||d.sessions))) throw 0;   // herkenbare BBB-back-up?
      if(!confirm("Deze back-up vervangt al je huidige data (zoo, sessies, gewicht, instellingen). Doorgaan?")) return;
      const keepKey=(S.profile&&S.profile.aiKey)||"", keepEp=(S.profile&&S.profile.aiEndpoint)||"";
      S=deepDefaults(migrate(d), defaultState());
      if(!S.profile.aiKey && keepKey) S.profile.aiKey=keepKey;          // sleutel uit back-up gestript → bestaande behouden
      if(!S.profile.aiEndpoint && keepEp) S.profile.aiEndpoint=keepEp;
      save(); applyAccent(); refreshChrome(); go(CURRENT_TAB);
      toast("⬆️","Data geïmporteerd! Welkom terug 💖","good");
    }catch(e){ toast("⚠️","Dit lijkt geen geldig BBB back-upbestand.","warn"); }
    finally{ ev.target.value=""; } };
  r.readAsText(f);
}

/* ============================================================
   ONBOARDING  (eerste keer)
   ============================================================ */
function startOnboarding(){
  const p=S.profile;
  openModal(`
    <h2>Welkom bij BBB! 🍑💖</h2>
    <div class="msub">Bo's Booty Builder 3000 — jouw eigen slimme coach én een zoo die je bouwt met sporten. Even een paar dingen instellen, dan kun je los. (Alles kun je later aanpassen.)</div>
    <div class="frow c2">
      <div class="field"><label>Hoe heet je?</label><input id="ob_naam" value="${esc(p.naam||"Bo")}"></div>
      <div class="field"><label>Lengte (cm)</label><input id="ob_lengte" type="number" value="${p.lengte??""}" placeholder="bv. 168"></div>
    </div>
    <div class="frow c2">
      <div class="field"><label>Huidig gewicht (kg)</label><input id="ob_start" type="number" step="0.1" value="${p.startGewicht??""}" placeholder="bv. 70"></div>
      <div class="field"><label>Streefgewicht (kg)</label><input id="ob_streef" type="number" step="0.1" value="${p.streefGewicht??""}" placeholder="bv. 64"></div>
    </div>
    <div class="frow c2">
      <div class="field"><label>Dagelijks stappendoel</label><input id="ob_stappenDoel" type="number" inputmode="numeric" value="${p.stappenDoel??10000}" placeholder="10000"></div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;margin:4px 0 14px">
      <div class="toggle ${p.cyclusAan?"on":""}" id="ob_cyclusToggle" onclick="this.classList.toggle('on')"></div>
      <span style="font-size:13.5px;color:var(--dim)">Cyclus-tracking gebruiken (privé, kan later)</span>
    </div>
    <div class="msub" style="margin-bottom:14px">💡 Tip: gewicht is maar één signaal. We focussen vooral op zwaarder tillen, lekker lopen en consistent zijn. Geen strenge diëten hier, want Botje kan zo lekker eten ☺️</div>
    <div class="factions">
      <button class="btn lg" onclick="finishOnboarding()">Let's go! 🚀</button>
    </div>`, false, true);
}
function finishOnboarding(){
  const p=S.profile;
  p.naam=(el("ob_naam").value||"Bo").trim()||"Bo";
  p.lengte=isNum(el("ob_lengte").value)?num(el("ob_lengte").value):null;
  p.startGewicht=isNum(el("ob_start").value)?num(el("ob_start").value):null;
  p.streefGewicht=isNum(el("ob_streef").value)?num(el("ob_streef").value):null;
  p.cyclusAan=el("ob_cyclusToggle").classList.contains("on");
  p.stappenDoel=isNum(el("ob_stappenDoel").value)?num(el("ob_stappenDoel").value):10000;
  if(p.startGewicht){ S.weights=[{datum:todayISO(), kg:p.startGewicht}]; }
  if(!p.eiwitDoel && p.startGewicht) p.eiwitDoel=Math.round(p.startGewicht*1.8);
  p.onboarded=true;
  save(); closeModal(true); applyAccent(); refreshChrome(); go("vandaag");
  setTimeout(()=>{ celebrate("Welkom "+p.naam+"! Stekkie staat te springen 🐾", 120); }, 350);
}

/* ============================================================
   CHROME — bovenbalk verversen (pootjes etc.)
   ============================================================ */
function refreshChrome(){
  el("pootjesPillVal").textContent=fmt(S.game.pootjes);
  renderTab(CURRENT_TAB);
}

/* ============================================================
   WEEK-RESET — niet-gedane sessies verdwijnen, geen schuld
   ============================================================ */
function checkWeekReset(){
  const mon=thisMonday();
  if(S.meta.lastWeekStart !== mon){
    // nieuwe week: oude voorstel laten vervallen (engine maakt nieuw in fase 3)
    S.meta.lastWeekStart = mon;
    if(S.week && S.week.weekStart!==mon) S.week=null;
    save();
  }
}

/* ============================================================
   INIT
   ============================================================ */
function sanitizeZones(){
  const g=S.game;
  g.zones=(g.zones||["home"]).filter(z=>ZONES[z]);
  if(!g.zones.includes("home")) g.zones.unshift("home");
  (g.dieren||[]).forEach(d=>{ if(!ZONES[d.zone]) d.zone="home"; });
  (g.faciliteiten||[]).forEach(f=>{ if(!ZONES[f.zone]) f.zone="home"; });
  (g.decoraties||[]).forEach(d=>{ if(!ZONES[d.zone]) d.zone="home"; });
  if(!ZONES[g.activeZone]) g.activeZone="home";
  // vangnet: nooit een lege beestenboel (corrupte/afgekapte back-up) → Stekkie terug
  if(!g.dieren || !g.dieren.length){
    g.dieren = [ JSON.parse(JSON.stringify(defaultGame().dieren[0])) ];
    g.album = g.album || [];
    if(!g.album.includes("stekkie")) g.album.push("stekkie");
  }
}
/* ---- herinneringen (native local-notifications) ---- */
const REMINDER_ID = 1771;
function _ln(){ const C=window.Capacitor; return (C && C.isNativePlatform && C.isNativePlatform() && C.Plugins && C.Plugins.LocalNotifications) ? C.Plugins.LocalNotifications : null; }
async function setupReminders(){
  const LN=_ln(); if(!LN) return;   // alleen in de geïnstalleerde app
  try{
    if(S.profile.notifs){
      const perm = await LN.requestPermissions();
      if(perm && perm.display && perm.display!=="granted"){ S.profile.notifs=false; save(); return; }
      await LN.schedule({ notifications: [{
        id: REMINDER_ID,
        title: "Bo's Booty Builder 3000 🍑",
        body: "Even bewegen vandaag? Je zoo (en je booty) groeit ervan 💪",
        schedule: { on: { hour: 18, minute: 30 }, repeats: true, allowWhileIdle: true }
      }]});
    } else {
      await LN.cancel({ notifications: [{ id: REMINDER_ID }] });
    }
  }catch(e){}
}
async function toggleNotifs(on){
  const LN=_ln();
  if(on && !LN){ toast("🔔","Herinneringen werken alleen in de geïnstalleerde app."); return; }
  S.profile.notifs=!!on; save();
  await setupReminders();
  toast("🔔", on? "Dagelijkse herinnering staat aan 🍑" : "Herinneringen uit.", "good");
}
/* directe melding na een gelogde sessie: complimentje + eiwit-reminder.
   No-op in de browser (LN=null) en als meldingen uit staan. Eigen id (≠ dagelijkse 18:30-reminder). */
async function fireSessionLoggedNotification(sess){
  const LN=_ln(); if(!LN || !S.profile.notifs) return;
  try{
    const d=todayISO(), tgt=proteinTarget(), tot=proteinDayTotal(d);
    const proteinHit = tgt ? tot>=tgt : false;
    const praise = ["Sterk bezig, Bo! 💪","Knal-sessie! 🔥","Topwerk — je bent een machine 🦾","Lekker bezig! 🍑","Trots op je 💖"];
    const title = "🎉 Sessie gelogd!";
    let body = praise[Math.floor(Math.random()*praise.length)];
    if(proteinHit){
      body += " En je eiwitdoel is al binnen — perfect 🥩✅";
    } else if(tgt){
      body += ` Vergeet je eiwitten niet — nog ${Math.max(0,tgt-tot)} g vandaag 🥩`;
    } else {
      body += " Vergeet je eiwitten niet vandaag 🥩";
    }
    await LN.schedule({ notifications: [{ id: 1772, title, body, schedule: { at: new Date(Date.now()+900) } }] });
  }catch(e){}
}
function init(){
  // OTA: meld de native laag dat deze web-bundle goed geladen is (Capgo, anders rollback). No-op in de browser.
  try{ if(window.Capacitor&&window.Capacitor.Plugins&&window.Capacitor.Plugins.CapacitorUpdater) window.Capacitor.Plugins.CapacitorUpdater.notifyAppReady(); }catch(e){}
  applyAccent();
  checkWeekReset();
  ensureWeek();
  ensureQuests();
  ensureStepsState();
  sanitizeZones();
  ensureAnimalSports();
  applyHappinessDecay();
  computeZooLevel();
  checkMilestones();
  checkStepUrl();
  refreshChrome();
  renderVandaag();
  setupReminders();   // native: (her)plan dagelijkse herinnering als 'ie aanstaat
  if(!S.profile.onboarded) setTimeout(startOnboarding, 250);
  startDoubleTimeWatch();
}
init();
